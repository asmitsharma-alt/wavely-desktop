//=================== INFINITE PLAYBACK ===================
// Fetches related (suggested) songs from the JioSaavn API and appends them
// to the queue, so playback never stops. Only works for online songs.
async function fetchSuggestions(saavnId, limit=15){
  try{
    const json=await saavnFetch('/songs/'+encodeURIComponent(saavnId)+'/suggestions?limit='+limit);
    const arr=(json&&json.data)||json;
    if(!Array.isArray(arr))return [];
    return arr.map(mapSaavnSong).filter(s=>s.streamUrl);
  }catch(e){console.warn('[Infinite] suggestions failed:',e.message);return [];}
}
// Called when the queue is nearly exhausted — appends related songs.
async function maybeExtendQueue(){
  if(!infinitePlay||infiniteFetching)return;
  // Only extend when we're at/near the end of the queue
  if(currentIndex < queue.length-2)return;
  // Find a seed: the current online song, else the most recent online song in queue
  let seed=currentSong();
  if(!seed||!seed.online||!seed.saavnId){
    for(let i=queue.length-1;i>=0;i--){
      const s=getSongById(queue[i]);
      if(s&&s.online&&s.saavnId){seed=s;break;}
    }
  }
  if(!seed||!seed.saavnId)return; // nothing online to base suggestions on
  infiniteFetching=true;
  try{
    const sugg=await fetchSuggestions(seed.saavnId,15);
    let added=0;
    sugg.forEach(s=>{
      if(!queue.includes(s.id)){queue.push(s.id);added++;}
    });
    if(added){saveAll();renderQueue();console.info('[Infinite] added',added,'suggested songs');}
  }finally{
    infiniteFetching=false;
  }
}

// Lyrics-specific API bases for JioSaavn lyrics endpoint.
function lyricsBases(){
  const extra=['https://jiosaavn-api-ten-beryl.vercel.app/api','https://saavn.sumit.co/api'];
  const all=[...SAAVN_BASES,...extra].map(b=>b.replace(/\/+$/,''));
  return [...new Set(all)];
}
function cleanLyricText(raw){
  return String(raw||'')
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/<[^>]+>/g,'')
    .replace(/&quot;/g,'"').replace(/&amp;/g,'&')
    .replace(/&#0?39;/g,"'").replace(/&apos;/g,"'")
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ')
    .replace(/\r\n/g,'\n').replace(/\r/g,'\n')
    .replace(/\n{3,}/g,'\n\n').trim();
}
// Normalise a track/artist string for matching (drop "(From ...)", "feat.", etc.)
function normTitle(t){
  return String(t||'')
    .replace(/\((?:from|feat\.?|featuring)[^)]*\)/gi,'')
    .replace(/\[[^\]]*\]/g,'')
    .replace(/\s*-\s*(?:from|feat\.?|featuring).*/i,'')
    .replace(/&quot;/g,'"').replace(/&amp;/g,'&')
    .trim();
}
function firstArtist(a){return String(a||'').split(/[,&]|feat\.?|ft\.?/i)[0].trim();}

// ---- LRCLIB (https://lrclib.net): free, no key, CORS-enabled, has SYNCED lyrics ----
async function fetchFromLrclib(song){
  const title=normTitle(song.title), artist=firstArtist(song.artist);
  if(!title||!artist)return null;
  const dur=Math.round(song.duration||0);
  // 1) Exact get (best match, returns synced + plain). Try with & without album/duration.
  const getAttempts=[];
  let g='/api/get?track_name='+encodeURIComponent(title)+'&artist_name='+encodeURIComponent(artist);
  if(song.album)getAttempts.push(g+'&album_name='+encodeURIComponent(normTitle(song.album))+(dur?'&duration='+dur:''));
  if(dur)getAttempts.push(g+'&duration='+dur);
  getAttempts.push(g);
  const exact=await firstTruthy(getAttempts.map(async path=>{
    try{
      const res=await fetchWithTimeout('https://lrclib.net'+path,LYRICS_FETCH_TIMEOUT_MS);
      if(!res.ok)return null;
      const d=await res.json();
      const lrc=d&&(d.syncedLyrics||d.plainLyrics);
      return lrc&&lrc.trim()?lrc:null;
    }catch(e){return null;}
  }));
  if(exact)return exact;
  // 2) Fuzzy search — pick best result that has lyrics (prefer synced)
  try{
    const res=await fetchWithTimeout('https://lrclib.net/api/search?track_name='+encodeURIComponent(title)+'&artist_name='+encodeURIComponent(artist),LYRICS_FETCH_TIMEOUT_MS);
    if(res.ok){
      const arr=await res.json();
      if(Array.isArray(arr)&&arr.length){
        const withSynced=arr.find(r=>r.syncedLyrics&&r.syncedLyrics.trim());
        const withPlain=arr.find(r=>r.plainLyrics&&r.plainLyrics.trim());
        const best=withSynced||withPlain;
        if(best)return best.syncedLyrics||best.plainLyrics;
      }
    }
  }catch(e){}
  // 3) Last resort: plain query search
  try{
    const res=await fetchWithTimeout('https://lrclib.net/api/search?q='+encodeURIComponent(artist+' '+title),LYRICS_FETCH_TIMEOUT_MS);
    if(res.ok){
      const arr=await res.json();
      if(Array.isArray(arr)&&arr.length){
        const best=arr.find(r=>r.syncedLyrics&&r.syncedLyrics.trim())||arr.find(r=>r.plainLyrics&&r.plainLyrics.trim());
        if(best)return best.syncedLyrics||best.plainLyrics;
      }
    }
  }catch(e){}
  return null;
}

// ---- lyrics.ovh: frequently unreliable, used as last-resort fallback ----
async function fetchFromLyricsOvh(song){
  const title=normTitle(song.title), artist=firstArtist(song.artist);
  if(!title||!artist)return null;
  try{
    const res=await fetchWithTimeout('https://api.lyrics.ovh/v1/'+encodeURIComponent(artist)+'/'+encodeURIComponent(title),LYRICS_FETCH_TIMEOUT_MS);
    if(!res.ok)return null;
    const d=await res.json();
    if(d&&d.lyrics&&d.lyrics.trim())return cleanLyricText(d.lyrics);
  }catch(e){}
  return null;
}

// ---- JioSaavn API lyrics (plain) — only for online Saavn songs ----
async function fetchFromSaavnApi(song){
  if(!song.saavnId)return null;
  const ids=[song.saavnId];
  if(song.lyricsId&&song.lyricsId!==song.saavnId)ids.push(song.lyricsId);
  const bases=lyricsBases();
  const attempts=[];
  for(const sid of ids){
    const enc=encodeURIComponent(sid);
    const paths=['/songs/'+enc+'/lyrics','/lyrics?id='+enc,'/lyrics/'+enc];
    for(const base of bases){
      for(const path of paths){
        attempts.push((async()=>{
          try{
            const res=await fetchWithTimeout(base+path,LYRICS_FETCH_TIMEOUT_MS);
            if(!res.ok)return null;
            const json=await res.json();
            if(json&&json.success===false)return null;
            const data=json?.data||json;
            let lyr=data?.lyrics||data?.lyric||(typeof data==='string'?data:'');
            if(lyr){lyr=cleanLyricText(lyr);if(lyr.length>=2)return lyr;}
          }catch(e){}
          return null;
        })());
      }
    }
  }
  return await firstTruthy(attempts);
}

// Generic online lyrics fetcher used by ALL songs (online + imported).
// LRCLIB is tried first (best source: has synced lyrics, CORS-enabled, reliable).
// For online Saavn songs, Saavn API runs concurrently with LRCLIB.
// lyrics.ovh is used as a last-resort fallback (frequently unreliable).
async function fetchLyricsOnline(song){
  if(lyricsStore[song.id])return lyricsStore[song.id];
  if(lyricsFetchPromises.has(song.id))return lyricsFetchPromises.get(song.id);
  const writeVersion=lyricsWriteVersion[song.id]||0;
  const job=(async()=>{
    let lrc=null;
    // Build a list of concurrent fetchers — LRCLIB always included (best quality).
    const fetchers=[fetchFromLrclib(song)];
    // For online Saavn songs, also try the Saavn lyrics API concurrently.
    if(song.online)fetchers.push(fetchFromSaavnApi(song));
    // Race all sources — first truthy result wins.
    lrc=await firstTruthy(fetchers);
    // Last resort: lyrics.ovh (unreliable but sometimes has results others don't)
    if(!lrc){
      try{lrc=await fetchFromLyricsOvh(song);}catch(e){}
    }
    if(lrc&&lrc.trim()){
      if((lyricsWriteVersion[song.id]||0)!==writeVersion)return lyricsStore[song.id]||null;
      if(lyricsStore[song.id])return lyricsStore[song.id];
      lyricsStore[song.id]=lrc.trim();
      LS.set('music_player_lyrics',lyricsStore);
      console.info('[Lyrics] found for',song.title);
      return lyricsStore[song.id];
    }
    console.warn('[Lyrics] none found for',song.artist,'-',song.title);
    return null;
  })();
  lyricsFetchPromises.set(song.id,job);
  try{return await job;}
  finally{if(lyricsFetchPromises.get(song.id)===job)lyricsFetchPromises.delete(song.id);}
}
// Backwards-compatible alias
async function fetchSaavnLyrics(song){return fetchLyricsOnline(song);}

async function downloadSong(id){
  const s=songs.find(x=>x.id===id);
  if(s&&s.online&&s.streamUrl){downloadSaavnSong(id);return;}
  const b=await idbGet('audio_blobs',id);
  if(!b){toast('Audio not found');return;}
  const lyrics=await lyricsForDownload(s||{id,title:'song'});
  let finalBlob=b, embedded={embedded:false};
  try{
    embedded=await embedLyricsInAudioBlob(b,s||{id,title:'song'},lyrics,(s?.format||'').toLowerCase());
    finalBlob=embedded.blob;
  }catch(e){console.warn('[Lyrics embed]',e);}
  const ext=(s?.format||'wav').toLowerCase();
  download((s&&s.title||'song')+'.'+ext,finalBlob);
  toast(embedded.embedded?'Downloaded with lyrics':lyrics?'Downloaded (lyrics could not be embedded)':'Downloaded');
}
function deleteSong(id){if(!confirm('Delete from library?'))return;songs=songs.filter(s=>s.id!==id);delete playCounts[id];delete loves[id];delete ratings[id];

function updateCrossfadePreview(v=prefs.crossfade||0){
  v=Math.max(0,Math.min(12,+v||0));
  const cfVal=document.getElementById('cfVal');
  const a=document.getElementById('cfTrackA');
  const b=document.getElementById('cfTrackB');
  const blend=document.getElementById('cfBlend');
  const label=document.getElementById('cfPreviewLabel');
  if(cfVal)cfVal.textContent=v;
  if(label)label.textContent=v?`${v}s crossfade`:'Gapless';
  if(!a||!b||!blend)return;
  const overlap=v?(v/12)*42:0;
  const aWidth=50+overlap/2;
  const bLeft=50-overlap/2;
  const blendWidth=v?Math.max(7,overlap):0.8;
  a.style.left='0%';
  a.style.width=aWidth+'%';
  b.style.left=bLeft+'%';
  b.style.width=aWidth+'%';
  blend.style.left=bLeft+'%';
  blend.style.width=blendWidth+'%';
  blend.classList.toggle('off',!v);
}

//=================== LYRICS ENGINE ===================
let parsedLyrics=[];
let lyricsMode='none'; // 'none','plain','synced','word'
let lastActiveIdx=-1;

async function ensureLyricsLoaded(song,{force=false,notify=false}={}){
  if(!song||!song.id||!song.title)return null;
  if(force){
    lyricsWriteVersion[song.id]=(lyricsWriteVersion[song.id]||0)+1;
    delete lyricsStore[song.id];
    lyricsFetchPromises.delete(song.id);
    lyricsFetchingIds.delete(song.id);
  }else if(lyricsStore[song.id]){
    if(queue[currentIndex]===song.id){
      loadLyricsView(song.id);lastActiveIdx=-1;syncLyrics();
    }
    return lyricsStore[song.id];
  }else if(lyricsFetchingIds.has(song.id)){
    const pending=lyricsFetchPromises.get(song.id);
    if(pending)return pending;
    lyricsFetchingIds.delete(song.id);
  }

  const loadVersion=lyricsWriteVersion[song.id]||0;
  // Mark as fetching BEFORE rendering so the view shows "Fetching lyrics…"
  // instead of briefly flashing "No lyrics available".
  lyricsFetchingIds.add(song.id);
  if(queue[currentIndex]===song.id)loadLyricsView(song.id);
  if(notify)toast('Fetching lyrics...');

  let result=null, failed=false;
  try{
    result=await fetchLyricsOnline(song);
  }catch(e){
    failed=true;
    console.warn('[Lyrics]',e);
  }

  if((lyricsWriteVersion[song.id]||0)===loadVersion)lyricsFetchingIds.delete(song.id);
  if(queue[currentIndex]===song.id&&(lyricsWriteVersion[song.id]||0)===loadVersion){
    loadLyricsView(song.id);lastActiveIdx=-1;syncLyrics();
  }
  if(notify&&(lyricsWriteVersion[song.id]||0)===loadVersion)toast(failed?'Could not fetch lyrics':(result?'Lyrics loaded':'No lyrics found for this song'));
  return result;
}
function retrySaavnLyrics(id){
  const song=getSongById(id);
  if(!song){toast('Song not found');return;}
  ensureLyricsLoaded(song,{force:true,notify:true});
}

function parseLRC(raw){
  // Supports:  [mm:ss.xx] line   (standard LRC)
  //            [mm:ss.xx] <mm:ss.xx> word <mm:ss.xx> word  (enhanced / word-level LRC)
  //            Multiple tags per line  [00:01.00][00:15.00] text
  //            Metadata lines like [ti:Title] are skipped
  const result=[];
  if(!raw)return result;
  const lines=raw.split(/\r?\n/);
  const tsRe=/\[(\d{1,3}):(\d{2})(?:[.:])(\d{1,3})?\]/g;
  const metaRe=/^\[[a-zA-Z]{2,}:/;
  const wordRe=/<(\d{1,3}):(\d{2})(?:[.:])(\d{1,3})?>/g;

  lines.forEach(line=>{
    line=line.trim();
    if(!line)return;
    if(metaRe.test(line))return; // skip [ti:...] [ar:...] etc.

    // Collect all timestamps on this line
    const timestamps=[];
    let m;tsRe.lastIndex=0;
    while((m=tsRe.exec(line))!==null){
      timestamps.push(parseTS(m[1],m[2],m[3]));
    }
    // Strip all [mm:ss.xx] from the line to get the text
    const text=line.replace(/\[\d{1,3}:\d{2}(?:[.:]\d{1,3})?\]/g,'').trim();
    if(!text&&!timestamps.length)return;

    // Parse word-level timestamps  <mm:ss.xx>
    let words=null;
    if(wordRe.test(text)){
      words=[];wordRe.lastIndex=0;
      const parts=text.split(/(<\d{1,3}:\d{2}(?:[.:]\d{1,3})?>)/);
      let wt=timestamps[0]||0;
      parts.forEach(part=>{
        const wm=part.match(/^<(\d{1,3}):(\d{2})(?:[.:])(\d{1,3})?>$/);
        if(wm){wt=parseTS(wm[1],wm[2],wm[3]);}
        else if(part.trim()){words.push({t:wt,text:part.trim()});}
      });
    }

    if(timestamps.length){
      // One entry per timestamp (for repeated lines)
      timestamps.forEach(t=>{
        result.push({t,text:words?words.map(w=>w.text).join(' '):text,words});
      });
    }else if(text){
      result.push({t:null,text,words:null});
    }
  });

  // Sort by timestamp, keeping untimed lines in their original relative order
  result.sort((a,b)=>{
    if(a.t===null&&b.t===null)return 0;
    if(a.t===null)return 1;
    if(b.t===null)return -1;
    return a.t-b.t;
  });
  return result;
}
function parseTS(mm,ss,xx){return (+mm)*60+(+ss)+(xx?+(('0.'+xx)):0);}

function loadLyricsView(id){
  const raw=lyricsStore[id];
  const scroll=document.getElementById('lyricsScroll');
  parsedLyrics=[];lastActiveIdx=-1;
  document.getElementById('miniLyric').textContent='';

  if(!raw||!raw.trim()){
    lyricsMode='none';
    let emptyHtml;
    if(lyricsFetchingIds.has(id)){
      // Lyrics are being fetched online (LRCLIB → lyrics.ovh → JioSaavn)
      emptyHtml=`<div style="text-align:center;padding-top:20vh">
        <div style="font-size:42px;animation:spin 1s linear infinite;display:inline-block">⏳</div>
        <p style="opacity:.7;font-size:18px;margin-top:16px">Fetching lyrics…</p></div>`;
    }else{
      const sng=getSongById(id);
      const retryBtn=(sng&&sng.title)?`<button class="pill-btn" onclick="retrySaavnLyrics('${id}')">🔄 Search Online</button>`:'';
      emptyHtml=`<div style="text-align:center;padding-top:20vh">
        <p style="opacity:.6;font-size:18px;margin-bottom:18px">No lyrics available</p>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="pill-btn accent" onclick="openLyricsEditor()">Add Lyrics</button>${retryBtn}</div></div>`;
    }
    scroll.innerHTML=emptyHtml;
    return;
  }

  parsedLyrics=parseLRC(raw);

  // Determine mode
  const timedCount=parsedLyrics.filter(l=>l.t!==null).length;
  const hasWords=parsedLyrics.some(l=>l.words&&l.words.length>1);
  if(timedCount===0){
    lyricsMode='plain';
  }else if(hasWords){
    lyricsMode='word';
  }else{
    lyricsMode='synced';
  }

  let html='';
  if(lyricsMode!=='plain')html+=`<div class="lyr-badge">${lyricsMode==='word'?'Word-synced':'Synced'} Lyrics</div>`;
  else html+=`<div class="lyr-badge">Plain Lyrics</div>`;

  parsedLyrics.forEach((l,i)=>{
    if(lyricsMode==='plain'){
      html+=`<div class="lyr-line plain" data-i="${i}">${esc(l.text)}</div>`;
    }else if(lyricsMode==='word'&&l.words){
      const wordsHTML=l.words.map((w,wi)=>`<span class="lyr-word" data-wi="${wi}" data-wt="${w.t}">${esc(w.text)} </span>`).join('');
      html+=`<div class="lyr-line" data-i="${i}" data-t="${l.t}" onclick="audio.currentTime=${l.t}">${wordsHTML}</div>`;
    }else{
      html+=`<div class="lyr-line" data-i="${i}" data-t="${l.t!=null?l.t:''}" onclick="${l.t!=null?'audio.currentTime='+l.t:''}">${esc(l.text)}</div>`;
    }
  });
  scroll.innerHTML=html;
  requestAnimationFrame(()=>fitLyricsText({force:true}));
}

function fitLyricsText({force=false}={}){
  const scroll=document.getElementById('lyricsScroll');
  if(!scroll)return;
  const maxWidth=Math.max(120,scroll.clientWidth-4);
  const lines=[...scroll.querySelectorAll('.lyr-line')];
  if(!lines.length)return;
  if(!force&&lines.every(el=>el.dataset.fitReady==='1'))return;

  let globalScale=1;
  scroll.style.setProperty('--lyrics-scale','1');
  const states=lines.map(el=>({
    el,
    active:el.classList.contains('active'),
    near:el.classList.contains('near'),
    previous:el.classList.contains('previous'),
    upcoming:el.classList.contains('upcoming')
  }));
  const measurer=document.createElement('div');
  measurer.style.cssText='position:absolute;left:-10000px;top:-10000px;visibility:hidden;white-space:nowrap;pointer-events:none;';
  document.body.appendChild(measurer);

  lines.forEach(el=>{
    const text=(el.textContent||'').trim();
    if(!text)return;
    el.classList.remove('active','near','previous','upcoming');
    const len=text.length;
    if(len>54)globalScale=Math.min(globalScale,0.94);
    if(len>72)globalScale=Math.min(globalScale,0.88);
    if(len>92)globalScale=Math.min(globalScale,0.8);

    const cs=getComputedStyle(el);
    measurer.style.fontFamily=cs.fontFamily;
    measurer.style.fontSize=cs.fontSize;
    measurer.style.fontWeight=cs.fontWeight;
    measurer.style.letterSpacing=cs.letterSpacing;
    measurer.textContent=text;
    let naturalWidth=measurer.getBoundingClientRect().width;
    if(!el.classList.contains('plain')){
      const activeScale=parseFloat(getComputedStyle(scroll).getPropertyValue('--lyrics-active-scale'))||1;
      measurer.style.fontSize=(parseFloat(cs.fontSize)*activeScale)+'px';
      measurer.style.fontWeight='780';
      naturalWidth=Math.max(naturalWidth,measurer.getBoundingClientRect().width);
    }
    if(naturalWidth>maxWidth)globalScale=Math.min(globalScale,Math.max(0.62,maxWidth/naturalWidth));
  });
  measurer.remove();

  scroll.style.setProperty('--lyrics-scale',globalScale.toFixed(2));
  states.forEach(({el,active,near,previous,upcoming})=>{
    el.classList.remove('active','near','previous','upcoming');
    if(active)el.classList.add('active');
    else if(previous)el.classList.add('previous');
    else if(upcoming)el.classList.add('upcoming');
    else if(near)el.classList.add('near');
    el.dataset.fitReady='1';
  });
}

function highlightLyricsContainer(scrollId,viewId,active,t){
  const container=document.getElementById(scrollId);
  if(!container)return;
  const shown=document.getElementById(viewId)&&document.getElementById(viewId).classList.contains('show');
  container.querySelectorAll('.lyr-line').forEach((el,i)=>{
    el.classList.remove('active','near','previous','upcoming');
    if(i===active)el.classList.add('active');
    else if(active>=0&&i===active-1)el.classList.add('previous');
    else if(active>=0&&i===active+1)el.classList.add('upcoming');
    else if(active<0&&i===0)el.classList.add('upcoming');
    else if(active>=0&&Math.abs(i-active)===2)el.classList.add('near');
  });
  if(active>=0&&shown){
    const el=container.querySelector(`.lyr-line[data-i="${active}"]`);
    if(el){
      const top=el.offsetTop-(container.clientHeight-el.offsetHeight)/2;
      container.scrollTo({top:Math.max(0,top),behavior:'smooth'});
    }
  }
  if(lyricsMode==='word'&&active>=0){
    const lineEl=container.querySelector(`.lyr-line[data-i="${active}"]`);
    if(lineEl)lineEl.querySelectorAll('.lyr-word').forEach(w=>w.classList.toggle('sung',t>=parseFloat(w.dataset.wt)));
    container.querySelectorAll('.lyr-line:not(.active) .lyr-word.sung').forEach(w=>w.classList.remove('sung'));
  }
}

function syncLyrics(){
  if(!parsedLyrics.length||lyricsMode==='none'||lyricsMode==='plain')return;
  const t=audio.currentTime;
  // Find the current active line using binary search (O(log n) instead of O(n))
  let lo=0, hi=parsedLyrics.length-1, active=-1;
  while(lo<=hi){
    const mid=(lo+hi)>>>1;
    if(parsedLyrics[mid].t!==null&&parsedLyrics[mid].t<=t){active=mid;lo=mid+1;}
    else{hi=mid-1;}
  }

  const changed=active!==lastActiveIdx;
  if(changed)lastActiveIdx=active;

  // Update line highlight + scroll only when active line changes
  if(changed){
    highlightLyricsContainer('lyricsScroll','lyricsView',active,t);
  }else if(lyricsMode==='word'&&active>=0){
    // Word-level karaoke needs per-frame updates within the active line
    const lineEl=document.querySelector(`#lyricsScroll .lyr-line[data-i="${active}"]`);
    if(lineEl)lineEl.querySelectorAll('.lyr-word').forEach(w=>w.classList.toggle('sung',t>=parseFloat(w.dataset.wt)));
  }

  // Mini lyric ticker in player bar
  if(active>=0)document.getElementById('miniLyric').textContent=parsedLyrics[active].text;
}

// Lyrics view progress scrubbing
(function(){
  const bar=document.getElementById('lyrProgressBar');
  if(!bar)return;
  const seek=e=>{const r=bar.getBoundingClientRect();const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));if(audio.duration)audio.currentTime=pct*audio.duration;};
  bar.onclick=seek;
  let dragging=false;
  bar.onmousedown=e=>{dragging=true;seek(e);};
  document.addEventListener('mousemove',e=>{if(dragging)seek(e);});
  document.addEventListener('mouseup',()=>{dragging=false;});
})();

function renderQueue(){
  const ql=document.getElementById('queueList');
  if(document.getElementById('tabHistory').classList.contains('active')){
    ql.innerHTML=history.slice(0,30).map(e=>{const s=restoreHistorySong(e);if(!s)return'';
      return `<div class="q-item" onclick="playSong('${s.id}')"><img src="${s.art}"><div class="q-meta"><div>${esc(s.title)}</div><div style="opacity:.5;font-size:11px">${esc(s.artist)}</div></div></div>`;}).join('');
    return;
  }
  let h=`<div class="queue-toolbar">
    <button class="pill-btn accent" onclick="openAddQueueModal()">+ Add Queue</button>
    ${queue.length>1?`<button class="pill-btn" onclick="clearQueueAfterCurrent()">Clear Queue</button>`:''}
  </div>
  <div class="queue-count">Playing Next · ${Math.max(0,queue.length-(currentIndex+1))} up next</div>`;
  queue.forEach((id,i)=>{const s=getSongById(id);if(!s)return;
    h+=`<div class="q-item ${i===currentIndex?'current':''}" data-queue-index="${i}">
      <div class="q-drag" title="Drag to reorder">::</div>
      <img src="${s.art}">
      <div class="q-meta"><div>${esc(s.title)}</div><div style="opacity:.5;font-size:11px">${esc(s.artist)}</div></div>
      ${i===currentIndex?'':`<button class="q-remove" title="Remove from queue" data-remove-queue="${i}">x</button>`}
    </div>`;});
  if(infinitePlay)h+=`<div style="text-align:center;opacity:.5;font-size:11px;margin-top:10px">Infinite playback on - related songs auto-added</div>`;
  ql.innerHTML=h;
  attachQueueDragHandlers();
}
function attachQueueDragHandlers(){
  const ql=document.getElementById('queueList');
  ql.querySelectorAll('.q-item[data-queue-index]').forEach(item=>{
    item.onclick=e=>{
      if(e.target.closest('.q-drag,.q-remove'))return;
      const i=+item.dataset.queueIndex;
      if(queue[i]){currentIndex=i;playSong(queue[i],true);}
    };
    item.oncontextmenu=e=>{e.preventDefault();removeQueueItem(+item.dataset.queueIndex);};
    const handle=item.querySelector('.q-drag');
    if(handle)handle.onpointerdown=e=>startQueuePointerDrag(e,item);
  });
  ql.querySelectorAll('[data-remove-queue]').forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation();removeQueueItem(+btn.dataset.removeQueue);};
  });
}
function startQueuePointerDrag(e,item){
  e.preventDefault();
  e.stopPropagation();
  const ql=document.getElementById('queueList');
  const from=+item.dataset.queueIndex;
  let over=item;
  item.classList.add('dragging');
  try{item.setPointerCapture?.(e.pointerId);}catch(_){}
  const move=ev=>{
    const el=document.elementFromPoint(ev.clientX,ev.clientY)?.closest?.('.q-item[data-queue-index]');
    if(!el||!ql.contains(el))return;
    if(over&&over!==el)over.classList.remove('drop-target');
    over=el;
    over.classList.add('drop-target');
  };
  const up=ev=>{
    try{item.releasePointerCapture?.(e.pointerId);}catch(_){}
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
    const dropEl=document.elementFromPoint(ev.clientX,ev.clientY)?.closest?.('.q-item[data-queue-index]');
    if(dropEl&&ql.contains(dropEl))over=dropEl;
    const to=over?+over.dataset.queueIndex:from;
    ql.querySelectorAll('.dragging,.drop-target').forEach(x=>x.classList.remove('dragging','drop-target'));
    moveQueueItem(from,to);
  };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up,{once:true});
}
function moveQueueItem(from,to){
  if(!Number.isInteger(from)||!Number.isInteger(to)||from<0||to<0||from>=queue.length||to>=queue.length||from===to)return;
  const movingCurrent=from===currentIndex;
  const [id]=queue.splice(from,1);
  queue.splice(to,0,id);
  if(movingCurrent)currentIndex=to;
  else if(from<currentIndex&&to>=currentIndex)currentIndex--;
  else if(from>currentIndex&&to<=currentIndex)currentIndex++;
  saveAll();renderQueue();preloadNextSong();
}
function removeQueueItem(i){
  if(i===currentIndex){toast('Current song stays in queue');return;}
  if(i<0||i>=queue.length)return;
  queue.splice(i,1);
  if(i<currentIndex)currentIndex--;
  saveAll();renderQueue();preloadNextSong();
}
function clearQueueAfterCurrent(){
  queue=queue.slice(0,Math.max(0,currentIndex+1));
  saveAll();renderQueue();preloadNextSong();
}

//=================== IMPORT (with ID3 + FLAC Vorbis comments) ===================
const SUPPORTED_AUDIO_EXTS=['mp3','flac','aac','m4a','ogg','oga','wav','opus'];
function fileExt(file){return (file.name.split('.').pop()||'').toLowerCase();}
function isSupportedAudioFile(file){return (file.type&&file.type.startsWith('audio/'))||SUPPORTED_AUDIO_EXTS.includes(fileExt(file));}
function canPlayImportedFile(file){
  const ext=fileExt(file);
  const byExt={
    flac:['audio/flac','audio/x-flac'],mp3:['audio/mpeg','audio/mp3'],aac:['audio/aac','audio/mp4'],
    m4a:['audio/mp4','audio/x-m4a'],ogg:['audio/ogg','audio/ogg; codecs="vorbis"'],oga:['audio/ogg'],
    wav:['audio/wav','audio/x-wav'],opus:['audio/opus','audio/ogg; codecs="opus"']
  };
  const candidates=[file.type,...(byExt[ext]||[])].filter(Boolean);
  if(!candidates.length||!audio.canPlayType)return true;
  return candidates.some(t=>audio.canPlayType(t)!=='');
}
async function handleFiles(files,opts={}){
  const picked=[...(files||[])];
  const arr=picked.filter(f=>isSupportedAudioFile(f)&&(!opts.onlyFlac||fileExt(f)==='flac'));
  if(!arr.length){toast(opts.onlyFlac?'No FLAC files selected':'No supported audio files found');return;}
  const maybeUnsupported=arr.filter(f=>!canPlayImportedFile(f));
  if(maybeUnsupported.length)toast(maybeUnsupported.length+' file(s) imported, but this browser may not play the format natively');
  const bar=document.getElementById('importBar');bar.style.display='block';
  let done=0,added=0,failed=0;
  for(const file of arr){
    const id='song_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    try{
      const tag=await readTags(file);
      const stored=await idbPut('audio_blobs',id,file);
      if(!stored){failed++;done++;bar.textContent=`Importing... ${done}/${arr.length}`;continue;}
      const name=file.name.replace(/\.[^.]+$/,'');
      const song={id,title:tag.title||name,artist:tag.artist||'Unknown Artist',album:tag.album||'Unknown Album',
        genre:tag.genre||'Unknown',year:tag.year||'',track:tag.track||0,duration:0,added:Date.now(),
        format:fileExt(file).toUpperCase(),art:tag.art||genArt(songs.length,(tag.artist||name).slice(0,2).toUpperCase())};
      if(tag.lyrics){lyricsStore[id]=tag.lyrics;LS.set('music_player_lyrics',lyricsStore);}
      songs.push(song);added++;
      done++;bar.textContent=`Importing... ${done}/${arr.length}`;
    }catch(e){
      failed++;done++;bar.textContent=`Importing... ${done}/${arr.length}`;
    }
  }
  saveSongs();saveAll();render(currentView);renderPlaylistSidebar();
  bar.style.display='none';
  if(added)toast(added+(opts.onlyFlac?' FLAC':'')+' song'+(added===1?'':'s')+' added to library');
  if(failed)toast(failed+' file'+(failed===1?'':'s')+' could not be saved');
}
function readTags(file){return new Promise(res=>{
  // Parse common ID3 tags plus native FLAC Vorbis comments and picture blocks.
  // Read up to 8 MB for FLAC (metadata blocks with lyrics + embedded art can be large)
  const ext=fileExt(file);
  const readSize=ext==='flac'?Math.min(file.size,8*1024*1024):(2*1024*1024);
  const r=new FileReader();
  r.onload=()=>{try{
    const buf=new Uint8Array(r.result);const tag={};
    if(ascii(buf,0,4)==='fLaC')readFlacTags(buf,tag);
    else if(ascii(buf,0,3)==='ID3')readId3Tags(buf,tag);
    res(tag);
  }catch(e){res({});}};
  r.onerror=()=>res({});
  r.readAsArrayBuffer(file.slice(0,readSize));
});}
function readId3Tags(buf,tag){
  const size=((buf[6]&0x7f)<<21)|((buf[7]&0x7f)<<14)|((buf[8]&0x7f)<<7)|(buf[9]&0x7f);
  let i=10;
  while(i<size+10&&i<buf.length-10){
    const fid=ascii(buf,i,4);
    const fsize=(buf[i+4]<<24)|(buf[i+5]<<16)|(buf[i+6]<<8)|buf[i+7];
    if(fsize<=0||fsize>size)break;
    const start=i+10;
    if(fid==='TIT2')tag.title=readText(buf,start,fsize);
    else if(fid==='TPE1')tag.artist=readText(buf,start,fsize);
    else if(fid==='TALB')tag.album=readText(buf,start,fsize);
    else if(fid==='TCON')tag.genre=readText(buf,start,fsize);
    else if(fid==='TYER'||fid==='TDRC')tag.year=readText(buf,start,fsize);
    else if(fid==='USLT'){
      // USLT frame: encoding(1) + lang(3) + descriptor(null-term) + lyrics text
      tag.lyrics=readUSLT(buf,start,fsize);
    }
    else if(fid==='SYLT'){
      // Synced lyrics — more complex but try to extract
      tag.lyrics=tag.lyrics||readText(buf,start,fsize);
    }
    else if(fid==='APIC'){const art=readApic(buf,start,fsize);if(art)tag.art=art;}
    i+=10+fsize;
  }
}
function readUSLT(buf,start,fsize){
  try{
    const enc=buf[start]; // 0=latin1, 1=utf16, 2=utf16be, 3=utf8
    // skip lang (3 bytes after encoding)
    let p=start+4;
    const end=start+fsize;
    // skip descriptor (null-terminated string)
    if(enc===1||enc===2){
      while(p+1<end&&!(buf[p]===0&&buf[p+1]===0))p++;
      p+=2;
    }else{
      while(p<end&&buf[p]!==0)p++;
      p++;
    }
    // remaining is the lyrics text
    const bytes=buf.slice(p,end);
    const decoder=enc===1?'utf-16':enc===2?'utf-16be':enc===3?'utf-8':'iso-8859-1';
    return new TextDecoder(decoder).decode(bytes).replace(/\0/g,'').trim();
  }catch(e){return readText(buf,start,fsize);}
}
function readFlacTags(buf,tag){
  let p=4,last=false;
  while(!last&&p+4<buf.length){
    const h=buf[p++];last=!!(h&0x80);const type=h&0x7f;
    const len=(buf[p]<<16)|(buf[p+1]<<8)|buf[p+2];p+=3;
    if(p+len>buf.length)break;
    if(type===4)readVorbisComments(buf,p,len,tag);
    else if(type===6&&!tag.art){const art=readFlacPicture(buf,p,len);if(art)tag.art=art;}
    p+=len;
  }
}
function readVorbisComments(buf,start,len,tag){
  let p=start,end=start+len;
  const le32=()=>{if(p+4>end)return 0;const v=(buf[p]|(buf[p+1]<<8)|(buf[p+2]<<16)|(buf[p+3]<<24))>>>0;p+=4;return v;};
  const vendorLen=le32();if(p+vendorLen>end)return;p+=vendorLen;
  const count=le32();
  for(let i=0;i<count&&p+4<=end;i++){
    const clen=le32();if(!clen||p+clen>end)break;
    const text=utf8(buf,p,clen);p+=clen;
    const eq=text.indexOf('=');if(eq<0)continue;
    const key=text.slice(0,eq).toUpperCase();const value=text.slice(eq+1);
    if(key==='TITLE')tag.title=value.trim();
    else if(key==='ARTIST')tag.artist=tag.artist||value.trim();
    else if(key==='ALBUMARTIST'||key==='PERFORMER'||key==='ALBUM ARTIST'){if(!tag.artist)tag.artist=value.trim();}
    else if(key==='ALBUM')tag.album=value.trim();
    else if(key==='GENRE')tag.genre=value.trim();
    else if(key==='DATE'||key==='YEAR'||key==='ORIGINALDATE')tag.year=tag.year||value.trim().slice(0,4);
    else if(key==='TRACKNUMBER')tag.track=parseInt(value,10)||0;
    // Lyrics: try many common Vorbis comment keys used by tagging tools
    // Priority: synced (LRC) > unsynced > plain
    else if(key==='LYRICS'){
      if(!tag.lyrics)tag.lyrics=value;
    }
    else if(key==='UNSYNCEDLYRICS'||key==='UNSYNCED LYRICS'||key==='UNSYNCED_LYRICS'){
      if(!tag.lyrics)tag.lyrics=value;
    }
    else if(key==='SYNCEDLYRICS'||key==='SYNCED LYRICS'||key==='SYNCED_LYRICS'){
      tag.lyrics=value; // synced overrides unsynced
    }
    // Some tools embed LRC as LYRICS with timestamps already present
    // Also handle the METADATA_BLOCK_PICTURE embedded in Vorbis comments (base64)
    else if(key==='METADATA_BLOCK_PICTURE'&&!tag.art){
      try{
        const bin=atob(value);const picBuf=new Uint8Array(bin.length);
        for(let j=0;j<bin.length;j++)picBuf[j]=bin.charCodeAt(j);
        const art=readFlacPicture(picBuf,0,picBuf.length);if(art)tag.art=art;
      }catch(e){}
    }
  }
}
function readFlacPicture(buf,start,len){try{
  let p=start,end=start+len;
  const be32=()=>{if(p+4>end)return 0;const v=((buf[p]<<24)|(buf[p+1]<<16)|(buf[p+2]<<8)|buf[p+3])>>>0;p+=4;return v;};
  be32();const mimeLen=be32();if(p+mimeLen>end)return null;
  const mime=ascii(buf,p,mimeLen);p+=mimeLen;
  const descLen=be32();p+=descLen+16;
  const dataLen=be32();if(!dataLen||p+dataLen>end)return null;
  const img=buf.slice(p,p+dataLen);const blob=new Blob([img],{type:mime||'image/jpeg'});return URL.createObjectURL(blob);
}catch(e){return null;}}
function ascii(buf,start,len){let s='';for(let i=0;i<len&&start+i<buf.length;i++)s+=String.fromCharCode(buf[start+i]);return s;}
function utf8(buf,start,len){try{return new TextDecoder('utf-8').decode(buf.slice(start,start+len)).replace(/\0/g,'').trim();}catch(e){return ascii(buf,start,len).replace(/\0/g,'').trim();}}
function readText(buf,start,size){const enc=buf[start];const bytes=buf.slice(start+1,start+size);
  try{return new TextDecoder(enc===1||enc===2?'utf-16':enc===3?'utf-8':'iso-8859-1').decode(bytes).replace(/\0/g,'').trim();}
  catch(e){return ascii(buf,start+1,size-1).replace(/\0/g,'').trim();}}
function readApic(buf,start,size){try{let i=start+1;while(buf[i]!==0)i++;const mimeStart=start+1;const mime=String.fromCharCode(...buf.slice(mimeStart,i));i++;i++;//pic type
  while(buf[i]!==0)i++;i++;const img=buf.slice(i,start+size);const blob=new Blob([img],{type:mime||'image/jpeg'});return URL.createObjectURL(blob);}catch(e){return null;}}

let searchSuggestIndex=-1;
function uniqueBy(arr,keyFn){
  const seen=new Set(),out=[];
  arr.forEach(x=>{const k=keyFn(x);if(!k||seen.has(k))return;seen.add(k);out.push(x);});
  return out;
}
function getSearchSuggestions(q){
  q=(q||'').toLowerCase().trim();
  const recent=LS.get('music_player_recent_searches',[]).filter(r=>!q||r.toLowerCase().includes(q)).slice(0,4)
    .map(r=>({type:'search',label:r,sub:'Recent search',value:r,icon:'↵'}));
  if(!q)return recent;
  const songMatches=songs.filter(s=>[s.title,s.artist,s.album].some(x=>String(x||'').toLowerCase().includes(q))).slice(0,5)
    .map(s=>({type:'song',label:s.title,sub:s.artist,value:s.id,art:s.art}));
  const artists=uniqueBy(songs.filter(s=>String(s.artist||'').toLowerCase().includes(q)),s=>s.artist.toLowerCase()).slice(0,3)
    .map(s=>({type:'artist',label:s.artist,sub:'Artist',value:s.artist,icon:'♪'}));
  const albums=uniqueBy(songs.filter(s=>String(s.album||'').toLowerCase().includes(q)),s=>(s.album+'|'+s.artist).toLowerCase()).slice(0,3)
    .map(s=>({type:'album',label:s.album,sub:s.artist,value:s.album+'|'+s.artist,icon:'▣'}));
  return [...recent,...songMatches,...artists,...albums].slice(0,10);
}
function renderSearchSuggestions(q){
  const box=document.getElementById('searchSuggest');if(!box)return;
  const items=getSearchSuggestions(q);
  searchSuggestIndex=-1;
  if(!items.length){hideSearchSuggestions();return;}
  box.innerHTML=items.map((it,i)=>`<div class="search-sug" data-sug-index="${i}" data-type="${it.type}" data-value="${esc(it.value)}" data-label="${esc(it.label)}">
    ${it.art?`<img src="${it.art}">`:`<span class="sug-ico">${esc(it.icon||'⌕')}</span>`}
    <div class="sug-main"><div>${esc(it.label)}</div><div class="sug-sub">${esc(it.sub||'')}</div></div>
    <div class="sug-type">${esc(it.type)}</div>
  </div>`).join('');
  box.classList.add('show');
  box.querySelectorAll('.search-sug').forEach(el=>el.onclick=()=>applySearchSuggestion(el));
}
function hideSearchSuggestions(){
  const box=document.getElementById('searchSuggest');if(box){box.classList.remove('show');box.innerHTML='';}

}
function setActiveSearchSuggestion(idx){
  const box=document.getElementById('searchSuggest');if(!box||!box.classList.contains('show'))return;
  const items=[...box.querySelectorAll('.search-sug')];if(!items.length)return;
  searchSuggestIndex=(idx+items.length)%items.length;
  items.forEach((el,i)=>el.classList.toggle('active',i===searchSuggestIndex));
  items[searchSuggestIndex].scrollIntoView({block:'nearest'});
}
function applySearchSuggestion(el){

(function bindDesktopTitlebarDrag(){
  if(!isDesktopShell)return;
  const titlebar=document.getElementById('titlebar');
  if(!titlebar)return;
  let dragging=false;
  const isInteractive=target=>!!target.closest('button,input,select,textarea,a,.title-right,#searchWrap,.window-orbit,[data-window-action]');
  titlebar.addEventListener('dblclick',e=>{
    if(isInteractive(e.target))return;
    e.preventDefault();
    e.stopPropagation();
    window.wavelyDesktop.windowControl('maximize').finally(()=>setTimeout(syncDesktopWindowState,80));
  },true);
  titlebar.addEventListener('mousedown',e=>{
    if(e.button!==0||e.detail>1||isInteractive(e.target))return;
    dragging=true;
    window.wavelyDesktop.startWindowDrag();
    e.preventDefault();
  });
  document.addEventListener('mousemove',()=>{
    if(dragging)window.wavelyDesktop.moveWindowDrag();
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    window.wavelyDesktop.endWindowDrag();
  });
  window.addEventListener('blur',()=>{
    if(!dragging)return;
    dragging=false;
    window.wavelyDesktop.endWindowDrag();
  });
})();
document.getElementById('btnEq').onclick=openEq;
document.getElementById('btnSettings').onclick=openSettings;
document.getElementById('btnStats').onclick=()=>setView('stats');
document.getElementById('btnHelp').onclick=openHelp;

document.getElementById('fileInput').onchange=e=>{handleFiles(e.target.files);e.target.value='';};
document.getElementById('flacInput').onchange=e=>{handleFiles(e.target.files,{onlyFlac:true});e.target.value='';};
document.getElementById('npHeart').onclick=()=>toggleLove(queue[currentIndex],document.getElementById('npHeart'));
document.getElementById('pbHeart').onclick=()=>toggleLove(queue[currentIndex],document.getElementById('pbHeart'));
document.getElementById('npArtist').onclick=()=>{const s=currentSong();if(s)setView('artist',s.artist);};
document.getElementById('npInfo').onclick=()=>{if(queue[currentIndex])openInfoModal(queue[currentIndex]);};
document.getElementById('npShare').onclick=()=>{navigator.clipboard?.writeText('song://'+queue[currentIndex]);toast('Link copied');};
document.getElementById('newPlaylistBtn').onclick=e=>{e.stopPropagation();const p=newPlaylist();setView('playlist',p.id);};

// progress scrubbing
const prog=document.getElementById('progress');
function scrub(e){const r=prog.getBoundingClientRect();const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));if(audio.duration)audio.currentTime=pct*audio.duration;}
prog.onclick=scrub;
let scrubbing=false;prog.onmousedown=()=>scrubbing=true;
document.addEventListener('mousemove',e=>{if(scrubbing)scrub(e);});
document.addEventListener('mouseup',()=>scrubbing=false);

// volume
const volEl=document.getElementById('vol');
function setVol(e){const r=volEl.getBoundingClientRect();const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));setPlayerVolume(pct);}
volEl.onclick=setVol;let volDrag=false;volEl.onmousedown=()=>volDrag=true;
document.addEventListener('mousemove',e=>{if(volDrag)setVol(e);});document.addEventListener('mouseup',()=>volDrag=false);
volEl.addEventListener('wheel',e=>{e.preventDefault();setPlayerVolume(volume+(e.deltaY<0?0.05:-0.05));});

// sidebar nav
document.querySelectorAll('.side-item[data-view]').forEach(it=>it.onclick=()=>setView(it.dataset.view));
document.querySelectorAll('.side-head').forEach(h=>h.onclick=e=>{if(e.target.id==='newPlaylistBtn')return;h.parentElement.classList.toggle('collapsed');saveSidebar();});
function saveSidebar(){const st={};document.querySelectorAll('.side-group').forEach(g=>st[g.dataset.group]=g.classList.contains('collapsed'));
  LS.set('music_player_sidebar_state',{collapsed:st,width:parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'))});}

// sidebar resize
const sd=document.getElementById('sideDivider');let resizing=false;
sd.onmousedown=()=>{resizing=true;document.body.style.cursor='col-resize';};
document.addEventListener('mousemove',e=>{if(resizing){const w=Math.max(180,Math.min(320,e.clientX));document.documentElement.style.setProperty('--sidebar-w',w+'px');}});
document.addEventListener('mouseup',()=>{if(resizing){resizing=false;document.body.style.cursor='';saveSidebar();}});

// search
let searchTimer;
document.getElementById('searchInput').oninput=e=>{
  clearTimeout(searchTimer);
  const q=e.target.value;
  renderSearchSuggestions(q);
  searchTimer=setTimeout(()=>{
    if(currentView==='artists'){
      setView('artists',q);
      return;
    }
    if(q)setView('search',q);
  },250);
};
document.getElementById('searchInput').onkeydown=e=>{
  const box=document.getElementById('searchSuggest');
  if(box&&box.classList.contains('show')){
    if(e.key==='ArrowDown'){e.preventDefault();setActiveSearchSuggestion(searchSuggestIndex+1);return;}
    if(e.key==='ArrowUp'){e.preventDefault();setActiveSearchSuggestion(searchSuggestIndex-1);return;}
    if(e.key==='Enter'&&searchSuggestIndex>=0){
      e.preventDefault();
      const active=box.querySelector('.search-sug.active');
      if(active){applySearchSuggestion(active);return;}
    }
    if(e.key==='Escape'){hideSearchSuggestions();return;}
  }
  if(e.key==='Enter'){hideSearchSuggestions();doSearch(e.target.value);}
};
document.getElementById('searchInput').addEventListener('blur',()=>setTimeout(hideSearchSuggestions,200));

// mini player
const mp=document.getElementById('miniPlayer');
document.getElementById('btnMini').onclick=()=>openExternalMiniPlayer();
document.getElementById('mpPlay').onclick=togglePlay;
document.getElementById('mpNext').onclick=()=>nextSong(false);
document.getElementById('mpPrev').onclick=prevSong;
mp.ondblclick=()=>mp.classList.remove('show');
let mpDrag=false,mpOff={x:0,y:0};
mp.addEventListener('mousedown',e=>{if(e.target.tagName==='BUTTON')return;mpDrag=true;mpOff.x=e.clientX-mp.offsetLeft;mpOff.y=e.clientY-mp.offsetTop;});
document.addEventListener('mousemove',e=>{if(mpDrag){mp.style.left=(e.clientX-mpOff.x)+'px';mp.style.top=(e.clientY-mpOff.y)+'px';}});
document.addEventListener('mouseup',()=>mpDrag=false);

// drag drop import
function isFileDrag(e){
  return [...(e.dataTransfer?.types||[])].includes('Files');
}
['dragover','dragenter'].forEach(ev=>document.addEventListener(ev,e=>{
  if(!isFileDrag(e))return;
  e.preventDefault();
  document.getElementById('dropOverlay').classList.add('show');
}));
['dragleave','drop'].forEach(ev=>document.addEventListener(ev,e=>{
  if(!isFileDrag(e))return;
  e.preventDefault();
  if(ev==='drop'||e.clientX<=0)document.getElementById('dropOverlay').classList.remove('show');
}));
document.addEventListener('drop',e=>{
  if(!isFileDrag(e))return;
  e.preventDefault();
  document.getElementById('dropOverlay').classList.remove('show');
  if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files);
});

// keyboard
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)||e.target.isContentEditable){if(e.key==='Escape')e.target.blur();return;}
  const cmd=e.ctrlKey||e.metaKey;
  if(e.key===' '){e.preventDefault();togglePlay();}
  else if(cmd&&e.key==='ArrowRight'){e.preventDefault();nextSong(false);}
  else if(cmd&&e.key==='ArrowLeft'){e.preventDefault();prevSong();}
  else if(cmd&&e.key==='ArrowUp'){e.preventDefault();setPlayerVolume(volume+0.1);}
  else if(cmd&&e.key==='ArrowDown'){e.preventDefault();setPlayerVolume(volume-0.1);}
  else if(cmd&&e.key==='l'){e.preventDefault();toggleLyrics();}
  else if(cmd&&e.key==='u'){e.preventDefault();document.getElementById('btnShuffle').click();}
  else if(cmd&&e.key==='r'){e.preventDefault();document.getElementById('btnRepeat').click();}
  else if(cmd&&e.key==='f'){e.preventDefault();document.getElementById('searchInput').focus();}
  else if(cmd&&e.key==='m'){e.preventDefault();mp.classList.toggle('show');}
  else if(cmd&&e.key==='e'){e.preventDefault();openEq();}
  else if(cmd&&e.key===','){e.preventDefault();openSettings();}
  else if(e.key==='Escape'){closeModal();hideCtx();if(document.getElementById('lyricsView').classList.contains('show'))toggleLyrics();}
  else if(['1','2','3','4','5'].includes(e.key)&&queue[currentIndex]){}
  else if(e.key==='l'||e.key==='L'){if(queue[currentIndex])toggleLove(queue[currentIndex]);}
  else if(e.key==='f'||e.key==='F'){toggleLyrics();}
});

// notification API on song change
function notify(s){if(prefs.notify&&Notification.permission==='granted')new Notification(s.title,{body:s.artist});}

// Save full playback session — called from timeupdate, beforeunload, and visibilitychange
function saveNowPlayingState(){
  if(!queue[currentIndex])return;
  LS.set('music_player_now_playing',{
    songId:queue[currentIndex],
    position:audio.currentTime||0,
    wasPlaying:isPlaying,
    queue:queue.slice(),
    currentIndex
  });
}
// Pause visualizer when tab hidden to save CPU/battery
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'){
    saveNowPlayingState();
    saveAllImmediate();
  }
});
window.addEventListener('beforeunload',()=>{
  saveNowPlayingState();
  saveAllImmediate();
});

//=================== INIT ===================
async function init(){
  await openDB();
  // Reset stale/broken Saavn API base URLs from previous versions
  const storedBases=LS.get('saavn_bases',null);
  if(storedBases){
    // Remove dead endpoints (saavn.dev DNS no longer resolves)
    const cleaned=storedBases.filter(b=>!b.includes('saavn.dev'));
    if(!cleaned.some(b=>b.includes('jiosaavn-api-ten-beryl')))cleaned.unshift('https://jiosaavn-api-ten-beryl.vercel.app/api');
    if(cleaned.length!==storedBases.length||!storedBases.some(b=>b.includes('jiosaavn-api-ten-beryl'))){
      SAAVN_BASES=cleaned;LS.set('saavn_bases',cleaned.length?cleaned:null);
    }
  }
  await seedDemo();
  // restore sidebar
  const ss=LS.get('music_player_sidebar_state',null);
  if(ss){if(ss.width)document.documentElement.style.setProperty('--sidebar-w',ss.width+'px');
    if(ss.collapsed)document.querySelectorAll('.side-group').forEach(g=>{if(ss.collapsed[g.dataset.group])g.classList.add('collapsed');});}
  document.getElementById('volFill').style.width=volume*100+'%';
  vc.style.opacity=(prefs.vizOpacity||35)/100;
  document.documentElement.style.setProperty('--np-w','300px');
  renderPlaylistSidebar();
  setView(currentView);
  renderQueue();
  updatePlayUI();
  // restore now playing and auto-resume
  const np=LS.get('music_player_now_playing',null);
  let autoResumePending=false;
  if(np&&np.songId&&getSongById(np.songId)){
    const s=getSongById(np.songId);
    // Restore the full queue so next/prev work as they did before close
    if(Array.isArray(np.queue)&&np.queue.length&&np.queue.every(id=>getSongById(id))){
      queue=np.queue.slice();
      currentIndex=(typeof np.currentIndex==='number'&&np.currentIndex<queue.length)?np.currentIndex:queue.indexOf(np.songId);
      if(currentIndex<0)currentIndex=0;
    }else{
      if(!queue.includes(np.songId))queue.push(np.songId);
      currentIndex=queue.indexOf(np.songId);
    }
    updateNowPlaying(s);updateColorsFromArt(s.art);
    renderQueue();
    // Load audio at saved position. Only auto-resume if it was playing before.
    loadSongIntoAudio(s,np.position).then(ok=>{
      if(!ok){isPlaying=false;updatePlayUI();return;}
      preloadNextSong();
      if(!np.wasPlaying){
        isPlaying=false;updatePlayUI();
        return;
      }
      initAudioGraph();
      startAudioElement(audio,s).then(ok=>{
        if(!ok)return;
        isPlaying=true;
        updatePlayUI();
        console.log('[Auto-resume] Playing from',fmt(np.position));
      }).catch(()=>{
        // Browser blocked autoplay — show resume prompt
        autoResumePending=true;
        const banner=document.createElement('div');
        banner.id='autoResumeBanner';
        banner.innerHTML=`<div style="position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:400;
          background:rgba(10,10,14,0.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);
          color:#fff;padding:14px 26px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;
          box-shadow:0 12px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;">
          <span>⏸ Last played: ${esc(s.title)}</span>
          <span style="opacity:.5">— click to resume</span></div>`;
        document.body.appendChild(banner);
        banner.onclick=()=>{
          startAudioElement(audio,s).then(ok=>{
            if(!ok)return;
            isPlaying=true;updatePlayUI();banner.remove();
          }).catch(()=>{});
        };
      });
    });
  }else if(songs.length){
    const s=songs[0];document.getElementById('npArt').src=s.art;document.getElementById('pbArt').src=s.art;
    updateColorsFromArt(s.art);
  }
}
init();
</script>
