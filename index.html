<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; img-src * data: blob:; media-src * data: blob:; connect-src *; font-src * data:; style-src 'self' 'unsafe-inline' https:;">
<title>Wavely</title>
<link rel="icon" href="build/icon.ico">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
:root{
  --color-primary:#7a3cff;
  --color-secondary:#3c2a6e;
  --color-accent:#ff4d8d;
  --color-text:#ffffff;
  --color-bg-start:#2a1845;
  --color-bg-end:#0d0a18;
  --glass-bg:rgba(255,255,255,0.07);
  --glass-border:rgba(255,255,255,0.14);
  --glass-blur:20px;
  --app-bg-opacity:1;
  --window-radius:24px;
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);
  --sidebar-w:240px;
  --np-w:300px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  font-display:swap;
  color:var(--color-text);
  background:#0d0a18;
  user-select:none;
  text-rendering:optimizeLegibility;
  -webkit-font-smoothing:subpixel-antialiased;
}
html.desktop-shell,html.desktop-shell body{background:transparent;}
html.desktop-shell body{border-radius:var(--window-radius);overflow:hidden;}
html.desktop-shell.window-maximized body{border-radius:0;}
html.desktop-shell #app,
html.desktop-shell #bgGradient,
html.desktop-shell #vizCanvas,
html.desktop-shell #lyricsView,
html.desktop-shell .modal-bg,
html.desktop-shell #dropOverlay{
  border-radius:var(--window-radius);
  overflow:hidden;
}
html.desktop-shell.window-maximized #app,
html.desktop-shell.window-maximized #bgGradient,
html.desktop-shell.window-maximized #vizCanvas,
html.desktop-shell.window-maximized #lyricsView,
html.desktop-shell.window-maximized .modal-bg,
html.desktop-shell.window-maximized #dropOverlay,
html.desktop-shell.window-maximized #app::after{
  border-radius:0;
}
html.desktop-shell #app{box-shadow:none;border:1px solid rgba(255,255,255,0.22);}
html.desktop-shell #app::after{content:'';position:absolute;inset:0;z-index:900;pointer-events:none;border-radius:var(--window-radius);
  border:1px solid rgba(255,255,255,0.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);}
#bgGradient{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,var(--color-bg-start),var(--color-bg-end));
  opacity:var(--app-bg-opacity);
  transition:background 2.5s var(--ease);
}
#vizCanvas{position:fixed;inset:0;z-index:1;opacity:0.35;pointer-events:none;transition:opacity .5s;}
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(var(--glass-blur)) saturate(150%);
  -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(150%);
  border:1px solid var(--glass-border);
  will-change:auto;
}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}

/* ===== APP GRID ===== */
#app{
  position:relative;z-index:2;height:100vh;display:grid;
  grid-template-columns:var(--sidebar-w) 1fr var(--np-w);
  grid-template-rows:48px 1fr 92px;
  contain:layout style;
  grid-template-areas:
    "title title title"
    "sidebar main nowplaying"
    "player player player";
}
/* TITLE BAR */
#titlebar{grid-area:title;display:flex;align-items:center;gap:16px;padding:0 12px;border-bottom:1px solid var(--glass-border);
  background:rgba(0,0,0,0.18);backdrop-filter:blur(calc(var(--glass-blur) + 10px));}
.window-orbit{display:flex;align-items:center;gap:6px;padding:3px;border-radius:999px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);}
.win-orb{width:28px;height:24px;border:0;border-radius:999px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.74);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.16s var(--ease);}
.win-orb svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.win-orb:hover{background:rgba(255,255,255,0.16);color:#fff;transform:translateY(-1px);}
.win-orb.min:hover{color:#73d7ff;}
.win-orb.max:hover{color:#9dffb7;}
.win-orb.close:hover{background:rgba(255,77,141,0.24);color:#ff8db7;}
.nav-arrows{display:flex;gap:4px;color:rgba(255,255,255,0.5);}
.nav-arrows button{background:none;border:none;color:inherit;font-size:18px;cursor:pointer;width:28px;height:28px;border-radius:6px;}
.nav-arrows button:hover{background:rgba(255,255,255,0.1);}
#searchWrap{flex:1;max-width:340px;margin:0 auto;position:relative;}
#searchInput{width:100%;height:30px;border-radius:8px;border:1px solid var(--glass-border);
  background:rgba(255,255,255,0.1);color:#fff;padding:0 12px 0 30px;font-size:13px;outline:none;}
#searchInput::placeholder{color:rgba(255,255,255,0.5);}
#searchWrap .si{position:absolute;left:9px;top:7px;opacity:.6;font-size:14px;}
#searchSuggest{display:none;position:absolute;top:100%;left:0;right:0;background:rgba(22,22,28,0.97);backdrop-filter:blur(18px);border:1px solid var(--glass-border);border-radius:10px;margin-top:4px;max-height:340px;overflow-y:auto;z-index:200;box-shadow:0 12px 40px rgba(0,0,0,.5);}
#searchSuggest.show{display:block;}
.search-sug{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:13px;transition:background .15s;}
.search-sug:hover,.search-sug.active{background:rgba(255,255,255,0.1);}
.search-sug img{width:34px;height:34px;border-radius:6px;object-fit:cover;}
.sug-ico{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border-radius:6px;font-size:16px;}
.sug-main{flex:1;min-width:0;}
.sug-main>div:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sug-sub{font-size:11px;opacity:.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sug-type{font-size:10px;opacity:.4;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;}
.title-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.title-right .window-orbit{margin-left:8px;}
.icon-btn{background:none;border:none;color:var(--color-text);cursor:pointer;width:32px;height:32px;border-radius:8px;
  font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s var(--ease);opacity:.85;}
.icon-btn.text-btn{width:auto;padding:0 10px;font-size:11px;font-weight:800;letter-spacing:.4px;}
.icon-btn:hover{background:rgba(255,255,255,0.14);opacity:1;}
.icon-btn.active{color:var(--color-accent);opacity:1;}

/* SIDEBAR */
#sidebar{grid-area:sidebar;overflow-y:auto;padding:14px 8px;border-right:1px solid var(--glass-border);
  background:rgba(0,0,0,0.14);position:relative;}
.side-group{margin-bottom:16px;}
.side-head{display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;
  color:rgba(255,255,255,0.45);padding:4px 10px;cursor:pointer;font-weight:700;}
.side-head .chev{transition:transform .2s;font-size:9px;}
.side-group.collapsed .chev{transform:rotate(-90deg);}
.side-group.collapsed .side-items{display:none;}
.side-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;font-size:13.5px;cursor:pointer;
  color:rgba(255,255,255,0.88);transition:.12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.side-item:hover{background:rgba(255,255,255,0.09);}
.side-item.active{background:var(--color-accent);color:#fff;font-weight:600;}
.side-item .ico{width:18px;text-align:center;font-size:14px;flex-shrink:0;}
.side-item.drag-over{background:rgba(255,255,255,0.22);outline:2px dashed var(--color-accent);}
.pl-cover{width:18px;height:18px;border-radius:4px;flex-shrink:0;background:#555;object-fit:cover;}
.side-divider{width:5px;cursor:col-resize;position:absolute;right:-2px;top:0;bottom:0;z-index:5;}
.saavn-dl{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);color:#fff;
  width:30px;height:30px;border-radius:8px;cursor:pointer;transition:.15s var(--ease);
  display:inline-flex;align-items:center;justify-content:center;opacity:.6;}
.saavn-dl:hover{opacity:1;background:var(--color-accent);border-color:var(--color-accent);transform:scale(1.08);}
.saavn-dl:active{transform:scale(0.92);}

/* MAIN */
#main{grid-area:main;overflow-y:auto;padding:22px 26px 30px;position:relative;}
#main.fade{opacity:0;transition:opacity .1s;}
.view-title{font-size:30px;font-weight:800;margin-bottom:18px;letter-spacing:-.5px;}
.row-section{margin-bottom:26px;}
.row-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
.row-head h3{font-size:20px;font-weight:700;}
.hscroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;}
.card{width:170px;flex-shrink:0;cursor:pointer;}
.card .art{width:170px;height:170px;border-radius:10px;overflow:hidden;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.4);
  transition:transform .25s var(--ease),box-shadow .25s;}
.card:hover .art{transform:translateY(-5px);box-shadow:0 16px 44px rgba(0,0,0,0.55);}
.card .art img{width:100%;height:100%;object-fit:cover;display:block;}
.card .play-ov{position:absolute;right:10px;bottom:10px;width:40px;height:40px;border-radius:50%;opacity:0;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:.2s;transform:translateY(6px);}
.card:hover .play-ov{opacity:1;transform:translateY(0);}
.card .c-title{font-size:13.5px;font-weight:600;margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card .c-sub{font-size:12px;color:rgba(255,255,255,0.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Albums grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:18px;}

/* Songs table */
.songs-table{width:100%;border-collapse:collapse;font-size:13.5px;}
.songs-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,0.45);
  padding:6px 10px;border-bottom:1px solid var(--glass-border);cursor:pointer;font-weight:700;position:sticky;top:0;}
.songs-table th:hover{color:#fff;}
.songs-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.05);}
.song-row{cursor:default;}
.song-row:hover{background:rgba(255,255,255,0.07);}
.song-row.selected{background:rgba(255,255,255,0.14);}
.song-row.playing td:nth-child(3){color:var(--color-accent);font-weight:600;}
.t-num{width:36px;color:rgba(255,255,255,0.5);text-align:center;}
.t-art{width:36px;height:36px;border-radius:5px;object-fit:cover;}
.art-thumb{position:relative;width:36px;height:36px;flex-shrink:0;border-radius:5px;overflow:hidden;display:inline-block;}
.art-thumb img{width:100%;height:100%;object-fit:cover;display:block;border-radius:5px;}
.art-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.55);color:#fff;font-size:13px;opacity:0;cursor:pointer;transition:opacity .15s var(--ease);}
.art-thumb:hover .art-play{opacity:1;}
.art-play:active{transform:scale(0.88);}
.cell-title{display:flex;align-items:center;gap:10px;}
.heart{cursor:pointer;color:rgba(255,255,255,0.3);transition:.15s;display:inline-flex;align-items:center;justify-content:center;}
.heart.loved{color:var(--color-accent);}
.heart.pop{animation:heartPop .4s var(--ease);}
@keyframes heartPop{0%{transform:scale(1);}40%{transform:scale(1.4);}100%{transform:scale(1);}}
/* eq bars playing icon */
.eqbars{display:inline-flex;gap:2px;align-items:flex-end;height:14px;}
.eqbars span{width:3px;background:var(--color-accent);border-radius:1px;animation:eqb 0.9s ease-in-out infinite;}
.eqbars span:nth-child(1){animation-delay:-.2s;}
.eqbars span:nth-child(2){animation-delay:-.5s;}
.eqbars span:nth-child(3){animation-delay:-.1s;}
@keyframes eqb{0%,100%{height:4px;}50%{height:14px;}}

/* Album detail */
.album-detail{display:flex;gap:26px;margin-bottom:24px;}
.album-detail .big-art{width:240px;height:240px;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.5);object-fit:cover;flex-shrink:0;}
.album-detail .info h2{font-size:26px;font-weight:800;}
.album-detail .info .meta{color:var(--color-accent);font-size:15px;margin:4px 0;font-weight:600;}
.album-detail .info .sub{color:rgba(255,255,255,0.5);font-size:13px;}
.pill-btn{background:rgba(255,255,255,0.16);border:none;color:#fff;padding:8px 22px;border-radius:9px;font-size:14px;
  font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;margin-top:14px;margin-right:10px;}
.pill-btn:hover{background:rgba(255,255,255,0.26);}
.pill-btn.accent{background:var(--color-accent);}

/* Artist avatar */
.artist-list{display:flex;flex-direction:column;gap:2px;}
.artist-item{display:flex;align-items:center;gap:14px;padding:8px 10px;border-radius:10px;cursor:pointer;}
.artist-item:hover{background:rgba(255,255,255,0.07);}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;}
.artist-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
.artist-card{cursor:pointer;min-height:210px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;
  padding:14px 12px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);
  transition:transform .2s,background .2s;}
.artist-card:hover{transform:translateY(-4px);background:rgba(255,255,255,.12);}
.artist-photo{width:132px;height:132px;border-radius:50%;background:var(--artist-gradient);background-size:cover;background-position:center;
  box-shadow:0 10px 28px rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;
  position:relative;overflow:hidden;}
.artist-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
.artist-photo.has-image img{display:block;}
.artist-photo.has-image .artist-initial{display:none;}
.artist-name{font-weight:800;font-size:15px;line-height:1.2;}
.artist-meta{font-size:11px;font-weight:700;opacity:.55;text-transform:uppercase;letter-spacing:.5px;}

/* genres */
.genre-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
.genre-card{min-height:220px;aspect-ratio:1/1;border-radius:14px;padding:16px;font-size:21px;font-weight:800;cursor:pointer;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-start;gap:5px;
  position:relative;overflow:hidden;background-image:var(--genre-image,none),var(--genre-gradient);
  background-size:cover,cover;background-position:center,center;
  box-shadow:0 8px 24px rgba(0,0,0,0.35);transition:transform .2s,filter .25s;}
.genre-card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.04),rgba(0,0,0,0.72));}
.genre-card:hover{transform:scale(1.03);}
.genre-card span{position:relative;z-index:1;display:block;text-shadow:0 2px 12px rgba(0,0,0,.55);}
.genre-card .genre-meta{font-size:11px;font-weight:700;opacity:.68;text-transform:uppercase;letter-spacing:.5px;}
.genre-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:0 0 16px;}

/* VISUALIZER PICKER MODAL */
.viz-picker{z-index:250;position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.viz-picker.show{display:flex;}
.viz-panel{max-width:620px;width:94%;border-radius:22px;padding:22px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 70px rgba(0,0,0,.6);}
.viz-panel h2{font-size:20px;font-weight:800;margin-bottom:8px;}
.viz-panel .sub{font-size:12px;opacity:.6;margin-bottom:18px;}
.viz-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:560px){.viz-grid{grid-template-columns:repeat(3,1fr);}}
.vz-opt{padding:14px 12px;border-radius:14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;transition:.15s var(--ease);text-align:center;}
.vz-opt:hover{background:rgba(255,255,255,0.14);transform:translateY(-2px);}
.vz-opt.active{background:var(--color-accent);border-color:var(--color-accent);transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(255,77,141,0.35);}
.vz-opt .vz-icon{font-size:32px;display:block;margin-bottom:8px;}
.vz-opt .vz-name{font-size:13.5px;font-weight:600;line-height:1.2;}
.vz-close{position:absolute;top:20px;right:24px;font-size:26px;cursor:pointer;opacity:.7;z-index:1;width:38px;height:38px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.12);}
.vz-close:hover{background:rgba(255,255,255,0.22);opacity:1;}

/* Empty states */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;color:rgba(255,255,255,0.5);gap:14px;}
.empty .big-ico{font-size:64px;opacity:.5;}
.empty h2{font-size:22px;color:#fff;}

/* NOW PLAYING PANEL */
#nowplaying{grid-area:nowplaying;overflow-y:auto;padding:20px;border-left:1px solid var(--glass-border);
  background:rgba(0,0,0,0.16);display:flex;flex-direction:column;align-items:center;}
#npArt{width:258px;height:258px;border-radius:14px;object-fit:cover;box-shadow:0 14px 44px rgba(0,0,0,0.55);
  transition:transform .3s var(--ease);}
.np-title{font-size:19px;font-weight:700;margin-top:18px;text-align:center;max-width:100%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.np-artist{font-size:14px;color:var(--color-accent);cursor:pointer;margin-top:3px;}
.np-actions{display:flex;gap:10px;margin-top:14px;font-size:18px;width:100%;justify-content:flex-end;}
#npHeart,#pbHeart{width:40px;height:40px;border-radius:8px;font-size:27px;line-height:1;background:none;
  border:0;color:rgba(255,255,255,0.72);flex-shrink:0;opacity:.9;}
#npHeart:hover,#pbHeart:hover{background:rgba(255,255,255,0.14);color:#fff;}
#npHeart.loved,#pbHeart.loved{color:var(--color-accent);background:none;box-shadow:none;}
#npHeart svg,#pbHeart svg{width:26px;height:26px;}
.np-section-toggle{display:flex;gap:8px;margin-top:18px;width:100%;}
.np-section-toggle button{flex:1;font-size:12px;padding:6px;border-radius:8px;border:1px solid var(--glass-border);
  background:rgba(255,255,255,0.06);color:#fff;cursor:pointer;}
.np-section-toggle button.active{background:var(--color-accent);}
#queueList{width:100%;margin-top:14px;display:none;}
#queueList.show{display:block;}
.q-item{display:flex;align-items:center;gap:10px;padding:7px 6px;border-radius:8px;font-size:12.5px;cursor:pointer;}
.q-item:hover{background:rgba(255,255,255,0.08);}
.q-item.current{background:rgba(255,255,255,0.14);}
.q-item.dragging{opacity:.45;}
.q-item.drop-target{outline:1px solid var(--color-accent);background:rgba(255,255,255,0.1);}
.q-item img{width:32px;height:32px;border-radius:5px;}
.q-drag{width:18px;height:32px;display:flex;align-items:center;justify-content:center;opacity:.45;cursor:grab;font-size:16px;line-height:1;user-select:none;touch-action:none;}
.q-drag:active{cursor:grabbing;}
.q-meta{min-width:0;flex:1;}
.q-meta>div:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-remove{width:24px;height:24px;border:0;border-radius:6px;background:transparent;color:rgba(255,255,255,0.55);cursor:pointer;font-size:16px;}
.q-remove:hover{background:rgba(255,255,255,0.12);color:#fff;}
.queue-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.queue-toolbar .pill-btn{flex:1;padding:7px 10px;font-size:12px;}
.queue-count{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;}
.add-queue-list{max-height:360px;overflow:auto;margin-top:10px;}
.add-queue-row{display:flex;align-items:center;gap:10px;padding:7px;border-radius:8px;}
.add-queue-row:hover{background:rgba(255,255,255,0.07);}
.add-queue-row img{width:34px;height:34px;border-radius:6px;object-fit:cover;}
.add-queue-row .meta{min-width:0;flex:1;}
.add-queue-row .title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.add-queue-row .sub{font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* PLAYER BAR */
#player{grid-area:player;display:flex;align-items:center;gap:18px;padding:0 18px;
  border-top:1px solid var(--glass-border);background:rgba(0,0,0,0.28);backdrop-filter:blur(40px);}
.pb-left{display:flex;align-items:center;gap:12px;width:260px;min-width:200px;}
.pb-left img{width:50px;height:50px;border-radius:8px;object-fit:cover;}
.pb-meta{overflow:hidden;}
.pb-meta .t{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pb-meta .a{font-size:12px;color:rgba(255,255,255,0.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pb-center{flex:1;max-width:620px;margin:0 auto;display:flex;flex-direction:column;gap:5px;}
.pb-controls{display:flex;align-items:center;justify-content:center;gap:8px;}
.pb-controls button{background:none;border:none;color:#fff;cursor:pointer;font-size:17px;width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:.12s;opacity:.9;}
.pb-controls button:hover{background:rgba(255,255,255,0.12);transform:scale(1.05);}
.pb-controls button:active{transform:scale(0.9);}
.pb-controls .play{font-size:22px;width:42px;height:42px;}
.pb-controls .active{color:var(--color-accent);text-shadow:0 0 10px var(--color-accent);}
.prog-wrap{display:flex;align-items:center;gap:10px;font-size:11px;color:rgba(255,255,255,0.6);}
.progress{flex:1;height:4px;background:rgba(255,255,255,0.18);border-radius:3px;cursor:pointer;position:relative;transition:height .15s;}
.progress:hover{height:6px;}
.prog-fill{height:100%;background:#fff;border-radius:3px;width:0%;position:relative;}
.prog-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%) scale(0);width:11px;height:11px;
  border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 4px rgba(0,0,0,.4);}
.progress:hover .prog-fill::after{transform:translateY(-50%) scale(1);}
.pb-right{display:flex;align-items:center;gap:8px;width:300px;justify-content:flex-end;}
.vol-wrap{display:flex;align-items:center;gap:6px;}
.vol{width:80px;height:4px;background:rgba(255,255,255,0.18);border-radius:3px;cursor:pointer;position:relative;}
.vol-fill{height:100%;background:#fff;border-radius:3px;width:70%;}
#miniLyric{position:absolute;bottom:96px;left:50%;transform:translateX(-50%);font-size:13px;color:#fff;
  text-shadow:0 1px 6px rgba(0,0,0,.6);max-width:60%;text-align:center;opacity:.85;pointer-events:none;z-index:30;}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.show{display:flex;}
.modal{border-radius:18px;padding:24px;max-width:520px;width:90%;max-height:86vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal h2{font-size:21px;margin-bottom:16px;}
.modal .close-x{position:absolute;top:14px;right:18px;font-size:22px;cursor:pointer;opacity:.7;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,0.1);border:1px solid var(--glass-border);
  border-radius:8px;color:#fff;padding:8px 10px;font-size:13.5px;outline:none;font-family:inherit;}
.field textarea{min-height:160px;resize:vertical;}
.cf-preview{position:relative;height:82px;margin-top:10px;border:1px solid rgba(255,255,255,0.12);border-radius:10px;
  background:rgba(255,255,255,0.055);overflow:hidden;padding:12px 12px 8px;}
.cf-stage{position:relative;height:42px;}
.cf-track{position:absolute;top:8px;height:24px;border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,0.15);
  transition:left .12s ease,width .12s ease;}
.cf-track::before{content:'';position:absolute;inset:0;opacity:.9;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,0.18) 0 3px,transparent 3px 9px),
    linear-gradient(90deg,rgba(255,255,255,0.08),rgba(255,255,255,0.18));}
.cf-a{left:0;background:linear-gradient(90deg,var(--color-primary),rgba(255,255,255,0.12));}
.cf-b{background:linear-gradient(90deg,rgba(255,255,255,0.12),var(--color-accent));}
.cf-blend{position:absolute;top:4px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,0.24);
  background:linear-gradient(90deg,rgba(255,255,255,0.08),var(--color-accent),rgba(255,255,255,0.08));
  box-shadow:0 0 22px rgba(255,255,255,0.16);transition:left .12s ease,width .12s ease,opacity .12s ease;}
.cf-blend.off{opacity:.35;}
.cf-centerline{position:absolute;top:0;bottom:0;left:50%;width:1px;background:rgba(255,255,255,0.22);}
.cf-labels{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.55);}
.cf-labels strong{color:#fff;font-size:12px;font-weight:700;}

/* EQ */
.eq-bands{display:flex;gap:14px;justify-content:center;margin:18px 0;}
.eq-band{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;}
.eq-slider{writing-mode:vertical-lr;direction:rtl;width:8px;height:120px;cursor:pointer;accent-color:var(--color-accent);}
.row-flex{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
.switch{position:relative;width:42px;height:24px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider-tg{position:absolute;inset:0;background:rgba(255,255,255,0.2);border-radius:24px;cursor:pointer;transition:.2s;}
.slider-tg::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.switch input:checked + .slider-tg{background:var(--color-accent);}
.switch input:checked + .slider-tg::before{transform:translateX(18px);}

/* CONTEXT MENU */
#ctxMenu{position:fixed;z-index:400;min-width:200px;border-radius:12px;padding:6px;display:none;
  box-shadow:0 12px 40px rgba(0,0,0,.6);font-size:13.5px;}
#ctxMenu.show{display:block;}
.ctx-item{padding:8px 12px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:10px;position:relative;}
.ctx-item:hover{background:var(--color-accent);}
.ctx-sep{height:1px;background:rgba(255,255,255,0.12);margin:5px 4px;}
.ctx-sub{position:absolute;left:100%;top:0;min-width:160px;border-radius:12px;padding:6px;display:none;
  background:rgba(30,30,40,0.96);backdrop-filter:blur(20px);box-shadow:0 12px 40px rgba(0,0,0,.6);}
.ctx-item.has-sub:hover .ctx-sub{display:block;}

/* TOAST */
#toasts{position:fixed;bottom:108px;right:20px;z-index:500;display:flex;flex-direction:column;gap:10px;}
.toast{padding:12px 18px;border-radius:12px;font-size:13.5px;box-shadow:0 8px 30px rgba(0,0,0,.5);
  animation:toastIn .3s var(--ease);min-width:200px;}
@keyframes toastIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* LYRICS FULLSCREEN — Apple Music style */
#lyricsView{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;overflow:hidden;
  background:#000;}
#lyricsView.show{display:flex;}

/* Ambient layered background: blurred art + colored glow + visualizer + subtle overlay */
#lyricsBg{position:absolute;inset:0;background-size:cover;background-position:center;
  filter:blur(120px) brightness(0.5) saturate(1.7);transform:scale(1.4);z-index:0;
  opacity:0.9;transition:background-image .6s ease;}
#ambientGlow{position:absolute;inset:-10%;z-index:1;pointer-events:none;opacity:0.55;
  background:
    radial-gradient(ellipse 55% 50% at 18% 28%, var(--color-primary, #7a3cff) 0%, transparent 60%),
    radial-gradient(ellipse 50% 55% at 82% 72%, var(--color-secondary, #3c2a6e) 0%, transparent 65%),
    radial-gradient(ellipse 65% 40% at 50% 50%, var(--color-accent, #ff4d8d) 0%, transparent 72%);
  filter:blur(50px);mix-blend-mode:screen;
  animation:ambientDrift 14s ease-in-out infinite alternate;}
#lyricsView.lyr-blur-off #lyricsBg{display:none!important;}
#lyricsView.lyr-viz-off #lyricsVizCanvas{display:none!important;}
#lyricsView.lyr-blur-off #ambientGlow{filter:blur(80px);opacity:0.4;}
@keyframes ambientDrift{
  0%{opacity:0.35;transform:translate(0,0) scale(1);}
  50%{opacity:0.55;transform:translate(1%,-1%) scale(1.05);}
  100%{opacity:0.7;transform:translate(-1%,1%) scale(1.1);}
}
#lyricsVizCanvas{position:absolute;inset:0;z-index:2;opacity:0.45;pointer-events:none;mix-blend-mode:screen;}
#lyricsOverlay{position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.1) 35%,rgba(0,0,0,0.1) 65%,rgba(0,0,0,0.45) 100%);}

/* Toggle buttons row */
#lyricsToggles{position:absolute;top:18px;left:20px;z-index:10;display:flex;gap:6px;}
.lyr-tog{background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);
  color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  transition:.15s var(--ease);letter-spacing:.2px;opacity:.75;}
.lyr-tog:hover{opacity:1;background:rgba(255,255,255,0.18);}
.lyr-tog.off{opacity:.45;background:rgba(0,0,0,0.25);border-color:rgba(255,255,255,0.08);}
.lyr-tog.off:hover{opacity:.7;}

/* Overlay controls */
#lyricsClose{position:absolute;top:18px;right:20px;font-size:18px;cursor:pointer;z-index:10;opacity:.8;
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.12);border:none;color:#fff;}
#lyricsClose:hover{background:rgba(255,255,255,0.22);opacity:1;}

/* Two-column stage */
#lyricsStage{position:relative;z-index:3;flex:1;display:grid;grid-template-columns:minmax(260px,42%) minmax(0,58%);align-items:center;
  gap:clamp(18px,4vw,64px);padding:clamp(58px,7vh,86px) clamp(28px,6vw,92px) clamp(34px,6vh,64px);width:100%;height:100%;}
.lyr-cover-side{height:100%;display:flex;align-items:center;justify-content:center;}
#lyricsCoverArt{width:min(38vw,440px);height:min(38vw,440px);border-radius:14px;object-fit:cover;
  box-shadow:0 30px 80px rgba(0,0,0,.65);transition:transform .3s var(--ease);user-select:none;}
/* Lyrics side (right) */
.lyr-lyrics-side{height:100%;display:flex;align-items:center;justify-content:flex-end;min-width:0;}
#lyricsScroll{--lyrics-scale:1;--lyrics-active-scale:1.34;width:min(100%,760px);max-height:min(78vh,760px);overflow-y:auto;text-align:left;scrollbar-width:none;
  scroll-behavior:smooth;padding:34vh 0 36vh 0;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
#lyricsScroll::-webkit-scrollbar{display:none;}

/* Apple-Music-style lyric lines (shared across lyrics views) */
.lyr-line{font-size:calc(clamp(24px,2.5vw,36px) * var(--lyrics-scale));font-weight:740;opacity:.18;margin:clamp(14px,2.4vh,24px) 0;
  transition:opacity .34s var(--ease),transform .34s var(--ease),filter .34s var(--ease),color .2s,font-weight .2s;
  cursor:pointer;color:#fff;line-height:1.26;transform:none;filter:blur(1.6px);max-width:100%;pointer-events:auto;
  text-wrap:balance;overflow-wrap:anywhere;letter-spacing:0;}
.lyr-line.previous{opacity:.42;transform:translateY(-3px);filter:blur(0.8px);}
.lyr-line.upcoming{opacity:.55;transform:translateY(3px);filter:blur(0.8px);}
.lyr-line.near{opacity:.36;transform:none;filter:blur(1px);}
.lyr-line.active{font-size:calc(clamp(24px,2.5vw,36px) * var(--lyrics-scale) * var(--lyrics-active-scale));
  opacity:1;text-shadow:0 0 28px rgba(255,255,255,0.28);font-weight:780;
  transform:none;filter:blur(0);color:#fff;pointer-events:auto;}
.lyr-line.plain{font-size:calc(clamp(19px,1.85vw,26px) * var(--lyrics-scale));opacity:.86;cursor:default;transform:none;filter:none;margin:clamp(8px,1.4vh,15px) 0;line-height:1.45;max-width:min(100%,760px);pointer-events:auto;}
.lyr-line .lyr-word{transition:color .2s,opacity .2s;}
.lyr-line .lyr-word.sung{color:var(--color-accent);opacity:1;}
.lyr-badge{display:inline-block;font-size:10px;letter-spacing:.5px;text-transform:uppercase;
  background:rgba(255,255,255,0.15);padding:3px 10px;border-radius:20px;margin-bottom:14px;font-weight:600;opacity:.7;}

@media(max-width:1100px){
  #lyricsStage{grid-template-columns:minmax(210px,40%) minmax(0,60%);gap:clamp(18px,3vw,34px);padding:64px 4vw 34px;}
  #lyricsCoverArt{width:min(34vw,300px);height:min(34vw,300px);}
  #lyricsScroll{max-height:76vh;}
}
@media(max-width:700px){
  #lyricsStage{grid-template-columns:36% minmax(0,64%);gap:12px;padding:56px 4vw 22px;}
  #lyricsCoverArt{width:min(32vw,150px);height:min(32vw,150px);border-radius:10px;}
  #lyricsScroll{max-height:76vh;padding:32vh 0 34vh;}
  .lyr-line{font-size:calc(clamp(20px,5.2vw,26px) * var(--lyrics-scale));margin:13px 0;line-height:1.22;}
  .lyr-line.active{font-size:calc(clamp(20px,5.2vw,26px) * var(--lyrics-scale) * var(--lyrics-active-scale));}
  .lyr-line.plain{font-size:calc(clamp(16px,4.2vw,20px) * var(--lyrics-scale));}
}



/* MINI PLAYER */
#miniPlayer{position:fixed;width:300px;height:78px;border-radius:14px;z-index:350;display:none;
  padding:10px;align-items:center;gap:10px;box-shadow:0 14px 42px rgba(0,0,0,.52);top:80px;left:80px;cursor:grab;}
#miniPlayer.show{display:flex;}
#miniPlayer img{width:56px;height:56px;border-radius:10px;object-fit:cover;}
#miniPlayer .mp-meta{flex:1;overflow:hidden;}
#miniPlayer .mp-meta .t{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#miniPlayer .mp-meta .a{font-size:11px;opacity:.58;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#miniPlayer .mp-ctrls{display:flex;gap:4px;}
#miniPlayer button{background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:13px;cursor:pointer;border-radius:8px;width:26px;height:26px;}

/* import progress */
#importBar{position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:600;padding:10px 20px;border-radius:12px;display:none;}

/* drag overlay */
#dropOverlay{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;font-size:24px;border:4px dashed var(--color-accent);}
#dropOverlay.show{display:flex;}

@media(max-width:1200px){
  #app{grid-template-columns:var(--sidebar-w) 1fr;grid-template-areas:"title title""sidebar main""player player";}
  #nowplaying{display:none;}
}
@media(max-width:900px){
  :root{--sidebar-w:200px;--np-w:260px;}
  .card{width:140px;}
  .card .art{width:140px;height:140px;}
  .view-title{font-size:24px;}
}
@media(max-width:760px){
  #app{grid-template-columns:1fr;grid-template-areas:"title""main""player";}
  #sidebar{display:none;}
  .view-title{font-size:22px;}
  .songs-table{font-size:12.5px;}
  .pb-right .icon-btn{width:28px;height:28px;font-size:14px;}
}
@media(max-width:480px){
  :root{--sidebar-w:100vw;}
  .pb-center{max-width:100%;}
  .pb-controls button{width:30px;height:30px;font-size:15px;}
  .pb-controls .play{width:36px;height:36px;}
  .songs-table{font-size:11.5px;}
  .songs-table th,.songs-table td{padding:6px 5px;}
}
.spectrum-canvas{display:block;}

<script>
(function(){
  if(window.wavelyDesktop||!window.__TAURI__)return;
  const invoke=(cmd,args={})=>{
    const core=window.__TAURI__.core||window.__TAURI__;
    return core.invoke(cmd,args);
  };
  window.wavelyDesktop={
    isElectron:true,
    windowControl(action){return invoke('window_control',{action});},
    isWindowMaximized(){return invoke('is_window_maximized');},
    startWindowDrag(){return invoke('start_window_drag');},
    moveWindowDrag(){return invoke('move_window_drag');},
    endWindowDrag(){return invoke('end_window_drag');},
    setGlassSettings(settings){return invoke('set_glass_settings',{settings});},
    fetchJson(url){return invoke('fetch_json',{url});}
  };
})();
</script>

<script>
//=================== STATE & STORAGE ===================
const LS = {
  get(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){toast('Storage full');}}
};
let songs = LS.get('music_player_songs',[]);
let playlists = LS.get('music_player_playlists',[]);
let queue = LS.get('music_player_queue',[]);
let volume = LS.get('music_player_volume',0.8);
let shuffle = LS.get('music_player_shuffle',false);
let repeat = LS.get('music_player_repeat','off');
let infinitePlay = LS.get('music_player_infinite', true); // auto-queue related songs
let infiniteFetching = false; // guard against duplicate suggestion fetches
let playCounts = LS.get('music_player_play_counts',{});
let ratings = LS.get('music_player_ratings',{});
let loves = LS.get('music_player_loves',{});
let lastPlayed = LS.get('music_player_last_played',{});
let lyricsStore = LS.get('music_player_lyrics',{});
let lyricsFetchingIds = new Set();
let lyricsFetchPromises = new Map();
let lyricsWriteVersion = {};
let history = LS.get('music_player_history',[]);
let prefs = LS.get('music_player_preferences',{accentMode:'album',vizMode:0,vizOpacity:35,vizSensitivity:65,fixedColor:'#ff4d8d',compact:false,showArt:true});
if(prefs.vizSensitivity==null)prefs.vizSensitivity=65;
if(prefs.crossfade==null)prefs.crossfade=0;
if(prefs.castReceiverAppId==null)prefs.castReceiverAppId='';
if(prefs.desktopGlassBlur==null)prefs.desktopGlassBlur=28;
if(prefs.desktopGlassOpacity==null)prefs.desktopGlassOpacity=72;
const isDesktopShell=!!window.wavelyDesktop?.isElectron;
if(isDesktopShell)document.documentElement.classList.add('desktop-shell');
function applyDesktopGlass(){
  const blur=Math.max(0,Math.min(60,+(prefs.desktopGlassBlur??28)));
  const opacityPct=Math.max(20,Math.min(100,+(prefs.desktopGlassOpacity??72)));
  document.documentElement.style.setProperty('--glass-blur',blur+'px');
  document.documentElement.style.setProperty('--app-bg-opacity',isDesktopShell?(opacityPct/100):1);
  if(isDesktopShell)window.wavelyDesktop.setGlassSettings({blur,opacity:opacityPct/100});
}
applyDesktopGlass();
async function syncDesktopWindowState(){
  if(!isDesktopShell||!window.wavelyDesktop?.isWindowMaximized)return;
  try{
    const maximized=await window.wavelyDesktop.isWindowMaximized();
    document.documentElement.classList.toggle('window-maximized',!!maximized);
  }catch(e){}
}
syncDesktopWindowState();
window.addEventListener('resize',()=>setTimeout(syncDesktopWindowState,80));
let eqSettings = LS.get('music_player_eq_settings',{bands:new Array(10).fill(0),preset:'Flat',enabled:false});
let sortState = LS.get('music_player_sort',{field:'title',dir:1});
let currentView = LS.get('music_player_view','songs');

let currentIndex = -1;       // index within queue
let isPlaying = false;
let selectedSongs = new Set();
const MEMORY_SAVER = true;
const VIZ_NAMES=[
  'Waveform Ring','Frequency Bars','Particle Storm','Aurora Waves','Spectrum Mirror',
  'Bloom Circle','Starburst Lines','DNA Helix','Confetti Bars','Ripple Grid',
  'Orbit Swarm','Tunnel Scope','Liquid Ribbons','Neon City','Pulse Flower',
  'Wave Terrain','Comet Trails','Prism Fan','Heartbeat Scope','Galaxy Spiral',
  'Bass Halo','Crystal Rain','Vortex Bars','Solar Flares','Audio Nebula',
  'Laser Lattice','Echo Rings','Pixel Pulse','Orbital Equalizer','Thunder Lines'
];
function normalizeVizMode(v){
  v=Number(v);
  return Number.isFinite(v)?Math.max(0,Math.min(VIZ_NAMES.length-1,Math.floor(v))):0;
}
let vizMode = normalizeVizMode(prefs.vizMode);
prefs.vizMode=vizMode;
let sleepTimer = null, sleepEnd = 0;

let audio = document.getElementById('audio');
let audioNext = document.getElementById('audioNext');
const audioEls = [audio,audioNext];
audioEls.forEach(el=>{el.preload=MEMORY_SAVER?'metadata':'auto';el.volume=volume;});
audioNext.preload = MEMORY_SAVER?'none':'auto';
let nextPreload = {songId:null, objectUrl:null, token:0};
let transitionInProgress=false;
let autoTransitionStartedFor=null;

//=================== INDEXEDDB ===================
let db;
function openDB(){return new Promise((res)=>{
  const r = indexedDB.open('music_player_db',2);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains('audio_blobs'))d.createObjectStore('audio_blobs');
    if(!d.objectStoreNames.contains('artwork_blobs'))d.createObjectStore('artwork_blobs');};
  r.onsuccess=e=>{db=e.target.result;res();};

//=================== WAV / DEMO AUDIO GENERATION ===================
function makeWav(notes, tempo, waveType){
  // notes: array of {f:freq(Hz),d:beats}; generate simple synth WAV
  const sr=22050; let total=0; notes.forEach(n=>total+=n.d*(60/tempo));
  const loopCount=Math.max(1,Math.ceil(20/total)); // ~20s
  const len=Math.floor(sr*total*loopCount);
  const buf=new Float32Array(len);
  let pos=0;
  for(let lc=0;lc<loopCount;lc++){
    notes.forEach(n=>{
      const ns=Math.floor(n.d*(60/tempo)*sr);
      for(let i=0;i<ns;i++){
        const t=i/sr; const env=Math.min(1,i/200)*Math.max(0,1-i/ns);
        let s;
        if(waveType==='saw')s=2*((t*n.f)%1)-1;
        else if(waveType==='square')s=Math.sin(2*Math.PI*n.f*t)>0?0.5:-0.5;
        else s=Math.sin(2*Math.PI*n.f*t);
        // add gentle harmonic + bass
        s=s*0.5+0.2*Math.sin(2*Math.PI*n.f*0.5*t);
        if(pos+i<len)buf[pos+i]+=s*env*0.5;
      }
      pos+=ns;
    });
  }
  // encode WAV 16-bit mono
  const ab=new ArrayBuffer(44+len*2);const dv=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');dv.setUint32(4,36+len*2,true);ws(8,'WAVE');ws(12,'fmt ');
  dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,1,true);
  dv.setUint32(24,sr,true);dv.setUint32(28,sr*2,true);dv.setUint16(32,2,true);dv.setUint16(34,16,true);
  ws(36,'data');dv.setUint32(40,len*2,true);
  let off=44;for(let i=0;i<len;i++){let v=Math.max(-1,Math.min(1,buf[i]));dv.setInt16(off,v*32767,true);off+=2;}
  return new Blob([ab],{type:'audio/wav'});
}

//=================== COLOR EXTRACTION (k-means-ish) ===================
function extractColors(img){
  const c=document.createElement('canvas');c.width=40;c.height=40;
  const ctx=c.getContext('2d');
  try{ctx.drawImage(img,0,0,40,40);}catch(e){return;}
  let data;try{data=ctx.getImageData(0,0,40,40).data;}catch(e){return;}
  const pts=[];
  for(let i=0;i<data.length;i+=4){pts.push([data[i],data[i+1],data[i+2]]);}
  // k-means k=5
  let cents=[];for(let k=0;k<5;k++)cents.push(pts[Math.floor(Math.random()*pts.length)].slice());
  for(let it=0;it<6;it++){
    const groups=cents.map(()=>[]);
    pts.forEach(p=>{let bi=0,bd=1e9;cents.forEach((c2,ci)=>{const d=(p[0]-c2[0])**2+(p[1]-c2[1])**2+(p[2]-c2[2])**2;if(d<bd){bd=d;bi=ci;}});groups[bi].push(p);});
    cents=groups.map((g,ci)=>{if(!g.length)return cents[ci];const s=[0,0,0];g.forEach(p=>{s[0]+=p[0];s[1]+=p[1];s[2]+=p[2];});return [s[0]/g.length,s[1]/g.length,s[2]/g.length].map(Math.round);});
    cents.counts=groups.map(g=>g.length);
  }
  // order by count
  const order=cents.map((c2,i)=>({c:c2,n:(cents.counts&&cents.counts[i])||0})).sort((a,b)=>b.n-a.n);
  const sat=c2=>{const mx=Math.max(...c2),mn=Math.min(...c2);return mx-mn;};
  const vibrant=[...order].sort((a,b)=>sat(b.c)-sat(a.c))[0].c;
  const prim=order[0].c,sec=order[1]?order[1].c:order[0].c;
  applyColors(prim,sec,vibrant);
}
function applyColors(prim,sec,acc){
  if(prefs.accentMode==='fixed'){const f=hexRgb(prefs.fixedColor);acc=f;}
  const lum=c=>0.299*c[0]+0.587*c[1]+0.114*c[2];
  const txt=lum(prim)>150?'#000':'#fff';
  const rs=document.documentElement.style;
  rs.setProperty('--color-primary',rgb(prim));
  rs.setProperty('--color-secondary',rgb(sec));

}

    b.frequency.value=f;b.Q.value=1;b.gain.value=eqSettings.enabled?eqSettings.bands[i]:0;return b;});

  end=Math.max(start+1,Math.min(data.length,end));
  let sum=0;for(let i=start;i<end;i++)sum+=data[i];
  return sum/(end-start)/255;

function syncAudioElementLevels(){
  audioEls.forEach(el=>{el.volume=volume;el.muted=audio.muted;});
  if(gainNode)gainNode.gain.setValueAtTime(audio.muted?0:1,actx.currentTime);
}
function setTrackGain(el,value,duration=0){
  const g=trackGains.get(el);
  if(!g||!actx)return;
  const now=actx.currentTime;
  const start=trackGainLevels.has(el)?trackGainLevels.get(el):g.gain.value;
  g.gain.cancelScheduledValues(now);
  value=Math.max(0,Math.min(1,value));
  duration=Math.max(0,+duration||0);
  if(duration<=0.02||Math.abs(start-value)<0.001){
    trackGainLevels.set(el,value);
    g.gain.value=value;
    g.gain.setValueAtTime(value,now);
    return;
  }
  const curve=new Float32Array(96);
  for(let i=0;i<curve.length;i++){
    const t=i/(curve.length-1);
    if(value>start)curve[i]=start+(value-start)*Math.sin(t*Math.PI/2);
    else curve[i]=value+(start-value)*Math.cos(t*Math.PI/2);
  }
  g.gain.setValueAtTime(start,now);
  g.gain.setValueCurveAtTime(curve,now,duration);
  g.gain.setValueAtTime(value,now+duration+0.005);
  trackGainLevels.set(el,value);
}
function pausePlayback(){
  audioEls.forEach(el=>{try{el.pause();}catch(e){}});
  isPlaying=false;
  updatePlayUI();
}
function clearAudioElement(el){
  try{el.pause();}catch(e){}
  if(el._url){URL.revokeObjectURL(el._url);el._url=null;}
  el.removeAttribute('src');
  try{el.load();}catch(e){}
}
async function loadSongIntoElement(el,song,pos=0){
  clearAudioElement(el);
  el.playbackRate=prefs.playbackSpeed||1;
  el.volume=volume;el.muted=audio.muted;
  if(song.streamUrl){
    el.src=song.streamUrl;el.currentTime=0;
    try{el.load();}catch(e){}
    await waitForMetadata(el,song,pos,2500);
    return true;
  }
  const blob=await idbGet('audio_blobs',song.id);
  if(!blob||!(blob instanceof Blob)){toast('Audio file is missing. Re-import this track.');return false;}
  el._url=URL.createObjectURL(blob);
  el.src=el._url;el.currentTime=0;
  try{el.load();}catch(e){}
  await waitForMetadata(el,song,pos,2500);
  return true;
}
function clearNextPreload(){
  const token=(nextPreload.token||0)+1;
  if(nextPreload.objectUrl&&audioNext._url===nextPreload.objectUrl)audioNext._url=null;
  if(nextPreload.objectUrl)URL.revokeObjectURL(nextPreload.objectUrl);
  nextPreload={songId:null,objectUrl:null,token};
  clearAudioElement(audioNext);
}
function nextQueueSongId(){
  if(currentIndex<0||!queue.length||repeat==='one')return null;
  if(currentIndex<queue.length-1)return queue[currentIndex+1];
  return repeat==='all'?queue[0]:null;
}
function waitForMetadata(el,song,pos=0,timeout=1500){
  return new Promise(r=>{
    let done=false;
    const finish=()=>{
      if(done)return;
      done=true;
      el.onloadedmetadata=null;
      if(el.duration&&(!song.duration||song.duration<1)){song.duration=el.duration;if(el===audio)saveSongs();}
      try{
        if(pos&&Number.isFinite(el.duration))el.currentTime=Math.min(pos,Math.max(0,el.duration-.2));
        else if(pos)el.currentTime=pos;
      }catch(e){}
      r();
    };
    if(el.readyState>=1)finish();
    else{
      el.onloadedmetadata=finish;
      setTimeout(finish,timeout);
    }
  });
}
async function preloadNextSong(){
  if(MEMORY_SAVER){clearNextPreload();return;}
  const songId=nextQueueSongId();
  if(!songId){clearNextPreload();return;}
  if(nextPreload.songId===songId&&audioNext.src)return;
  const song=getSongById(songId);
  if(!song){clearNextPreload();return;}
  const token=(nextPreload.token||0)+1;
  clearNextPreload();
  nextPreload.token=token;
  try{
    const ok=await loadSongIntoElement(audioNext,song,0);
    if(nextPreload.token!==token)return;
    if(!ok)return;
    nextPreload={songId,objectUrl:audioNext._url||null,token};
  }catch(e){
    if(nextPreload.songId===songId)clearNextPreload();
  }
}
async function loadSongIntoAudio(song,pos=0){
  return await loadSongIntoElement(audio,song,pos);
}
async function startAudioElement(el,song){
  try{
    await el.play();
    return true;
  }catch(e){
    console.warn('[Playback start]',e);
    const format=(song&&song.format)||'';
    const unsupported=format==='FLAC'?'This browser cannot play FLAC natively':'Unable to play this audio file';
    toast(e&&e.name==='NotAllowedError'?'Click play to start audio':unsupported);
    isPlaying=false;updatePlayUI();
    return false;
  }
}
function recordSongActivated(songId,song){
  isPlaying=true;
  playCounts[songId]=(playCounts[songId]||0)+1;
  lastPlayed[songId]=new Date().toISOString();
  history.unshift({id:songId,t:new Date().toISOString(),song:snapshotSong(song)});
  // Start the real lyrics request before rendering now-playing state so the
  // lyrics view shows loading only while an actual fetch is active.
  if(!lyricsStore[songId])ensureLyricsLoaded(song);
  updateNowPlaying(song);
  updateColorsFromArt(song.art);
  saveAll();renderQueue();highlightPlaying();
  preloadNextSong();
  maybeExtendQueue().then(preloadNextSong);
}
async function transitionToSong(songId,targetIndex,{auto=false,duration=null}={}){
  if(transitionInProgress)return;
  const song=getSongById(songId);if(!song)return;
  transitionInProgress=true;
  try{
    initAudioGraph();if(actx.state==='suspended')await actx.resume();
    if(nextPreload.songId!==songId||!audioNext.src){
      const ok=await loadSongIntoElement(audioNext,song,0);
      if(!ok){transitionInProgress=false;playSong(songId);return;}
      nextPreload={songId,objectUrl:audioNext._url||null,token:(nextPreload.token||0)+1};
    }
    audioNext.playbackRate=prefs.playbackSpeed||1;
    setTrackGain(audioNext,0,0);
    syncAudioElementLevels();
    if(!await startAudioElement(audioNext,song)){
      isPlaying=!audio.paused;updatePlayUI();
      transitionInProgress=false;return;
    }
    let fade=duration==null?(auto?+(prefs.crossfade||0):Math.min(0.8,+(prefs.crossfade||0)||0.25)):duration;
    fade=Math.max(0,Math.min(12,fade));
    setTrackGain(audio,0,fade);
    setTrackGain(audioNext,1,fade);
    if(fade>0)await new Promise(r=>setTimeout(r,fade*1000));
    const oldActive=audio, promoted=audioNext;
    try{oldActive.pause();oldActive.currentTime=0;}catch(e){}
    nextPreload={songId:null,objectUrl:null,token:(nextPreload.token||0)+1};
    audio=promoted;audioNext=oldActive;
    clearAudioElement(audioNext);
    setTrackGain(audio,1,0);setTrackGain(audioNext,0,0);
    currentIndex=targetIndex;
    autoTransitionStartedFor=null;
    recordSongActivated(songId,song);
  }catch(e){
    console.warn('[Transition]',e);
    try{await playSong(songId);}catch(_){}
  }finally{
    transitionInProgress=false;
  }
}
async function playSong(songId, fromQueue=false){
  initAudioGraph();if(actx.state==='suspended')await actx.resume();
  let qi=(fromQueue&&queue[currentIndex]===songId)?currentIndex:queue.indexOf(songId);
  if(qi<0){queue.push(songId);qi=queue.length-1;}
  currentIndex=qi;
  const song=getSongById(songId);if(!song)return;
  const ok=await loadSongIntoAudio(song);if(!ok)return;
  setTrackGain(audio,1,0);setTrackGain(audioNext,0,0);
  audio.playbackRate=prefs.playbackSpeed||1;
  if(!await startAudioElement(audio,song))return;
  recordSongActivated(songId,song);
}
function updateColorsFromArt(src){
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>extractColors(img);img.src=src;
}
function togglePlay(){
  if(currentIndex<0){if(queue.length){playSong(queue[0]);}else if(songs.length){playByList(songs.map(s=>s.id),0);}return;}
  if(audio.paused){initAudioGraph();if(actx.state==='suspended')actx.resume();startAudioElement(audio,currentSong());}
  else{pausePlayback();return;}
  updatePlayUI();
}
function playByList(ids,idx){queue=ids.slice();if(shuffle)shuffleQueue(idx);playSong(queue[shuffle?0:idx]);}
function shuffleQueue(keepIdx){
  const cur=queue[keepIdx];const rest=queue.filter((_,i)=>i!==keepIdx);
  for(let i=rest.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[rest[i],rest[j]]=[rest[j],rest[i]];}
  queue=[cur,...rest];
}
async function nextSong(auto){
  if(transitionInProgress)return;
  if(repeat==='one'&&auto){audio.currentTime=0;await startAudioElement(audio,currentSong());return;}
  if(currentIndex<queue.length-1){await transitionToSong(queue[currentIndex+1],currentIndex+1,{auto});}
  else if(repeat==='all'){await transitionToSong(queue[0],0,{auto});}
  else if(infinitePlay&&auto){
    // Queue ran out — try to fetch & play a related song (infinite playback)
    await extendAndContinue();
  }
  else{isPlaying=false;updatePlayUI();}
}
async function extendAndContinue(){
  const before=queue.length;
  await maybeExtendQueue();
  if(queue.length>before){await transitionToSong(queue[currentIndex+1],currentIndex+1,{auto:true});}
  else{isPlaying=false;updatePlayUI();toast('No more songs to play');}
}
function prevSong(){
  if(audio.currentTime>3){audio.currentTime=0;return;}
  if(currentIndex>0){currentIndex--;playSong(queue[currentIndex],true);}
  else audio.currentTime=0;
}
function maybeStartAutoCrossfade(){
  const cf=+(prefs.crossfade||0);
  if(!cf||transitionInProgress||repeat==='one'||!audio.duration)return;
  const remain=audio.duration-audio.currentTime;
  const key=queue[currentIndex]+':'+currentIndex;
  if(remain>0&&remain<=cf&&autoTransitionStartedFor!==key){
    autoTransitionStartedFor=key;
    nextSong(true);
  }
}
function bindPlaybackEvents(el){
  el.addEventListener('ended',()=>{if(el===audio&&!transitionInProgress)nextSong(true);});
  el.addEventListener('error',()=>{
    if(el!==audio)return;
    const s=currentSong();
    toast(s&&s.format==='FLAC'?'This browser cannot play FLAC natively':'Unable to play this audio file');
    isPlaying=false;updatePlayUI();
  });
  el.addEventListener('timeupdate',()=>{
    if(el!==audio||!audio.duration)return;
    const pct=audio.currentTime/audio.duration*100;
    document.getElementById('progFill').style.width=pct+'%';
    document.getElementById('curTime').textContent=fmt(audio.currentTime);
    document.getElementById('durTime').textContent=fmt(audio.duration);
    maybeStartAutoCrossfade();
    syncPipMiniPlayer();
    saveNowPlayingState();
    syncLyrics();
  });
  el.addEventListener('play',()=>{if(el===audio){isPlaying=true;updatePlayUI();}});
  el.addEventListener('pause',()=>{if(el===audio&&!transitionInProgress){isPlaying=false;updatePlayUI();}});
}
audioEls.forEach(bindPlaybackEvents);

const CAST_SENDER_URL='https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1';
let castSenderLoading=null, castReady=false, castOptionsAppId='';
function getCastableAudioUrl(song){
  if(!song)return '';
  if(/^https?:\/\//i.test(song.streamUrl||''))return song.streamUrl;
  if(Array.isArray(song.downloadUrl)){
    const best=song.downloadUrl.find(q=>/^https?:\/\//i.test(q?.url||q?.link||'')&&(String(q?.quality||'').includes('320')||String(q?.quality||'').includes('high')))
      ||song.downloadUrl.find(q=>/^https?:\/\//i.test(q?.url||q?.link||''));
    if(best)return best.url||best.link||'';
  }
  return '';
}
function mimeFromCastUrl(song,url){
  const fmt=String(song?.format||'').toLowerCase();
  const clean=String(url||'').split('?')[0].toLowerCase();
  if(fmt.includes('mp3')||clean.endsWith('.mp3'))return 'audio/mpeg';
  if(fmt.includes('m4a')||fmt.includes('aac')||clean.endsWith('.m4a')||clean.endsWith('.aac'))return 'audio/mp4';
  if(fmt.includes('ogg')||clean.endsWith('.ogg')||clean.endsWith('.oga'))return 'audio/ogg';
  if(fmt.includes('opus')||clean.endsWith('.opus'))return 'audio/ogg';
  if(fmt.includes('wav')||clean.endsWith('.wav'))return 'audio/wav';
  if(fmt.includes('flac')||clean.endsWith('.flac'))return 'audio/flac';
  return 'audio/mpeg';
}
function parseCastLyrics(raw){
  const text=String(raw||'').trim();
  if(!text)return [];
  const timed=[];
  text.split(/\r?\n/).forEach(line=>{
    const tags=[...line.matchAll(/\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g)];
    const lyric=line.replace(/\[[^\]]+\]/g,'').trim();
    tags.forEach(tag=>{
      const frac=tag[3]||'0';
      const ms=frac.length===3?+frac:(frac.length===2?+frac*10:+frac*100);
      timed.push({time:(+tag[1])*60+(+tag[2])+ms/1000,text:lyric});
    });
  });
  timed.sort((a,b)=>a.time-b.time);
  if(timed.length)return timed;
  return text.split(/\r?\n/).filter(Boolean).map((line,i)=>({time:i*4,text:line.trim()}));
}
function buildCastMediaInfo(song,url){
  const mediaInfo=new chrome.cast.media.MediaInfo(url,mimeFromCastUrl(song,url));
  const metadata=new chrome.cast.media.MusicTrackMediaMetadata();
  metadata.title=song.title||'Unknown';
  metadata.artist=song.artist||'Unknown Artist';
  metadata.albumName=song.album||'';
  if(song.art)metadata.images=[new chrome.cast.Image(song.art)];
  mediaInfo.metadata=metadata;
  mediaInfo.streamType=chrome.cast.media.StreamType.BUFFERED;
  mediaInfo.customData={
    title:song.title||'Unknown',
    artist:song.artist||'Unknown Artist',
    album:song.album||'',
    art:song.art||'',
    lyrics:lyricsStore[song.id]||'',
    parsedLyrics:parseCastLyrics(lyricsStore[song.id]||'')
  };
  return mediaInfo;
}
function initCastApi(force=false){
  if(!window.cast?.framework||!window.chrome?.cast||!prefs.castReceiverAppId)return false;
  if(castReady&&!force&&castOptionsAppId===prefs.castReceiverAppId)return true;
  try{
    cast.framework.CastContext.getInstance().setOptions({
      receiverApplicationId:prefs.castReceiverAppId,
      autoJoinPolicy:chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
    });
    castReady=true;
    castOptionsAppId=prefs.castReceiverAppId;
    return true;
  }catch(e){
    console.warn('[Cast init]',e);
    return false;
  }
}
function ensureCastSenderLoaded(){
  if(window.cast?.framework&&window.chrome?.cast){
    initCastApi();
    return Promise.resolve(true);
  }
  if(castSenderLoading)return castSenderLoading;
  castSenderLoading=new Promise(resolve=>{
    let settled=false;
    const done=value=>{
      if(settled)return;
      settled=true;
      if(!value)castSenderLoading=null;
      resolve(value);
    };
    const oldCb=window.__onGCastApiAvailable;
    window.__onGCastApiAvailable=isAvailable=>{
      if(typeof oldCb==='function')try{oldCb(isAvailable);}catch(e){}
      done(!!isAvailable&&initCastApi());
    };
    const existing=[...document.scripts].find(s=>s.src===CAST_SENDER_URL);
    if(existing){
      setTimeout(()=>done(!!(window.cast?.framework&&window.chrome?.cast)&&initCastApi()),1500);
      return;
    }
    const script=document.createElement('script');
    script.src=CAST_SENDER_URL;
    script.async=true;
    script.onerror=()=>done(false);
    document.head.appendChild(script);
    setTimeout(()=>done(!!(window.cast?.framework&&window.chrome?.cast)&&initCastApi()),6000);
  });
  return castSenderLoading;
}
async function castLyricsMode(){
  const song=currentSong();
  if(!song){toast('Nothing playing');return;}
  const url=getCastableAudioUrl(song);
  if(!url){toast('Cast needs an online audio URL');return;}
  if(!prefs.castReceiverAppId){
    const id=prompt('Enter your Google Cast Custom Receiver App ID for lyrics mode:','');
    if(!id){toast('Receiver App ID required for lyrics mode');return;}
    prefs.castReceiverAppId=id.trim();
    saveAllImmediate();
  }
  toast('Connecting to Cast...');
  const ready=await ensureCastSenderLoaded();
  if(!ready){toast('Cast is unavailable in this browser');return;}
  try{
    const ctx=cast.framework.CastContext.getInstance();
    let session=ctx.getCurrentSession();
    if(!session)session=await ctx.requestSession();
    if(!session){toast('No Cast session');return;}
    if(!lyricsStore[song.id]){
      toast('Loading lyrics for Cast...');
      await ensureLyricsLoaded(song);
    }
    const req=new chrome.cast.media.LoadRequest(buildCastMediaInfo(song,url));
    req.currentTime=Math.max(0,audio.currentTime||0);
    req.autoplay=true;
    await session.loadMedia(req);
    pausePlayback();
    toast('Casting lyrics mode');
  }catch(e){
    console.warn('[Cast]',e);
    toast('Could not start Cast');
  }
}

function sortSongs(list){

// Global handler: clicking a cover's play overlay plays that song immediately,
// without triggering the row's normal select behaviour (capture phase + stopPropagation).
// It builds a queue from the other rows in the same list so next/prev work too.
document.addEventListener('click',e=>{
  const btn=e.target.closest('.art-play');
  if(!btn)return;
  e.stopPropagation();e.preventDefault();
  const id=btn.dataset.play;
  if(!id)return;
  const row=btn.closest('.song-row');
  // Songs shown in search results (data-saavn / data-radio) start a RADIO:
  // play just this song and auto-queue related suggestions, NOT the whole list.
  if(row&&(row.dataset.saavn||row.dataset.radio)){
    playRadio(id);
    return;
  }
  // Curated lists (local playlists, albums, Explore playlists) keep the list order.
  const table=btn.closest('table');
  if(table){
    const ids=[...table.querySelectorAll('.song-row')].map(r=>r.dataset.id).filter(Boolean);
    if(ids.length){
      queue=ids.slice();
      const idx=queue.indexOf(id);
      const start=idx<0?0:idx;
      if(shuffle)shuffleQueue(start);
      playSong(queue[shuffle?0:start]);
      return;
    }
  }
  playSong(id);
},true);

async function loadArtistThumbs(artists){
  const cards=new Map([...main.querySelectorAll('[data-online-artist]')].map(card=>[card.dataset.onlineArtist,card]));
  const missing=[];
  artists.forEach(a=>{
    const card=cards.get(a.name);
    if(!card)return;
    const generated=generatedArtistImage(a.name);
    const cached=artistThumbs[a.name];
    const localArt=localArtistThumb(a.name);
    const usableCached=!invalidArtistThumb(cached);
    if(usableCached){
      setArtistCardThumb(card,cached,generated);
    } else if(localArt){
      setArtistCardThumb(card,localArt,generated);
    } else {
      /* Show the gradient + initial only, no img needed yet */
      const photo=card.querySelector('.artist-photo');
      if(photo){
        photo.style.backgroundImage=artistColor(a.name);
        photo.classList.remove('has-image');
      }
    }
    if(!usableCached||!['override','deezer','theaudiodb','wikidata','jiosaavn-artist','wikipedia','commons','itunes'].includes(artistThumbSources[a.name]))missing.push(a);
  });
  let changed=false;
  let index=0;
  async function worker(){
    while(index<missing.length&&currentView==='artists'){
      const i=index++;
      if(i>=missing.length)break;
      const a=missing[i];
      try{
        const thumb=await fetchFreeArtistThumb(a.query);
        if(!thumb?.url||thumb.source==='generated')continue;
        artistThumbs[a.name]=thumb.url;
        artistThumbSources[a.name]=thumb.source;
        changed=true;
        const card=cards.get(a.name);
        if(card?.isConnected){
          const generated=generatedArtistImage(a.name);
          setArtistCardThumb(card,thumb.url,generated);
        }
      }catch(e){
        console.warn('[Artist free thumb]',a.name,e.message);
      }
    }
  }
  await Promise.all([worker(),worker()]);
  if(changed){
    LS.set('artist_thumbs',artistThumbs);
    LS.set('artist_thumb_sources',artistThumbSources);
  }
}
function mapSaavnArtist(raw){
  const name=cleanHtml(raw?.name||raw?.title||'').trim();
  if(!name)return null;
  const thumb=pickBest(raw.image);
  if(thumb&&!saavnDefaultImage(thumb)){
    artistThumbs[name]=thumb;
    artistThumbSources[name]='jiosaavn-artist';
  }
  return {name,query:name,local:0,source:'JioSaavn'};
}
function artistPopularityScore(raw,term){
  const name=cleanHtml(raw?.name||raw?.title||'').trim();
  const n=name.toLowerCase();
  const q=String(term||'').trim().toLowerCase();
  const thumb=pickBest(raw?.image);
  let score=0;
  if(n===q)score+=120;
  else if(n.startsWith(q))score+=90;
  else if(n.includes(q))score+=55;
  if(thumb&&!saavnDefaultImage(thumb))score+=35;
  if(raw?.role&&String(raw.role).toLowerCase().includes('artist'))score+=15;
  if(/[,&]/.test(name))score-=18;
  if(/\b(feat|ft|x)\b/i.test(name))score-=24;
  score-=Math.min(30,Math.max(0,name.length-24));
  return score;
}
async function loadOnlineArtistResults(term,existingKeys){

let SAAVN_BASES=LS.get('saavn_bases',null)||[
  'https://jiosaavn-api-ten-beryl.vercel.app/api'
];

function fetchWithTimeout(url,ms){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{headers:{'Accept':'application/json'},signal:ctrl.signal})
    .finally(()=>clearTimeout(tid));
}
function firstTruthy(promises){
  return new Promise(resolve=>{
    let pending=promises.length;
    if(!pending){resolve(null);return;}
    let done=false;
    promises.forEach(p=>{
      Promise.resolve(p).then(v=>{
        if(done)return;
        if(v){done=true;resolve(v);return;}
        if(--pending===0)resolve(null);
      }).catch(()=>{
        if(!done&&--pending===0)resolve(null);
      });
    });
  });
}

async function saavnFetch(path){
  let lastErr;
  for(let i=0;i<SAAVN_BASES.length;i++){
    const base=SAAVN_BASES[i].replace(/\/+$/,'');
    const url=base+path;
    try{
      const res=await fetchWithTimeout(url,10000);
      if(!res.ok){lastErr=new Error('HTTP '+res.status+' — '+base);continue;}
      const json=await res.json();
      if(json&&json.success===false){lastErr=new Error('API error from '+base);continue;}
      if(i!==0){SAAVN_BASES=[base,...SAAVN_BASES.filter((_,j)=>j!==i)];LS.set('saavn_bases',SAAVN_BASES);}
      return json;
    }catch(e){
      lastErr=new Error((e.name==='AbortError'?'Timeout (10s)':'Network error')+' — '+base);
      console.warn('[Saavn]',url,e.message);
    }
  }
  throw lastErr||new Error('All Saavn endpoints failed');
}

function pickBest(arr){
  if(typeof arr==='string'&&arr)return arr;
  if(!Array.isArray(arr)||!arr.length)return '';
  for(let i=arr.length-1;i>=0;i--){
    const u=(arr[i]||{}).url||(arr[i]||{}).link;
    if(u)return u;
  }
  return '';
}

function saavnArtists(raw){
  try{
    // Shape 1 (search/songs): artists.primary[].name
    if(raw.artists?.primary?.length) return raw.artists.primary.map(a=>a.name).join(', ');
    // Shape 2 (search, no downloadUrl): primaryArtists string
    if(typeof raw.primaryArtists==='string'&&raw.primaryArtists) return raw.primaryArtists;
    // Shape 3: flat artists array
    if(Array.isArray(raw.artists)&&raw.artists[0]?.name) return raw.artists.map(a=>a.name).join(', ');
    // Shape 4: singers string
    if(typeof raw.singers==='string'&&raw.singers) return raw.singers;
  }catch(e){}
  return 'Unknown Artist';
}

function cleanHtml(s){
  return String(s||'').replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&#039;/g,"'").replace(/&lt;/g,'<').replace(/&gt;/g,'>').trim();
}

function mapSaavnSong(raw){
  const id='saavn_'+raw.id;
  // Prefer 500x500 image then 150x150
  const art=pickBest(raw.image)||genArt(hashCode(raw.id||''),cleanHtml(raw.name||raw.title||'??').slice(0,2).toUpperCase());
  const streamUrl=pickBest(raw.downloadUrl);
  const albumName=raw.album?.name||(typeof raw.album==='string'?raw.album:'')||'JioSaavn';
  const song={
    id,saavnId:raw.id,
    title:cleanHtml(raw.name||raw.title||'Unknown'),
    artist:saavnArtists(raw),
    album:cleanHtml(albumName),
    genre:raw.language?String(raw.language).replace(/^\w/,c=>c.toUpperCase()):'Online',
    year:String(raw.year||''),
    duration:+(raw.duration||0),
    art,streamUrl,downloadUrl:raw.downloadUrl||[],
    online:true,format:'STREAM',
    hasLyrics:!!raw.hasLyrics,
    lyricsId:raw.lyricsId||null
  };
  saavnSongCache[id]=song;
  if(!songs.find(s=>s.id===id))songs.push(song);
  return song;
}

    try{lyr=await fetchLyricsOnline(song)||'';}catch(e){}
  }
  return cleanLyricText(lyr);
}
function textBytes(s){return new TextEncoder().encode(String(s||''));}
function strBytes(s){return Uint8Array.from(String(s||''),c=>c.charCodeAt(0)&255);}
function u32be(n){const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,n>>>0,false);return b;}
function u32le(n){const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,n>>>0,true);return b;}
function concatBytes(parts){
  const total=parts.reduce((n,p)=>n+p.length,0), out=new Uint8Array(total);
  let off=0;parts.forEach(p=>{out.set(p,off);off+=p.length;});
  return out;
}
function id3Size(n){return Uint8Array.from([(n>>21)&127,(n>>14)&127,(n>>7)&127,n&127]);}
function id3TextFrame(id,text){
  const payload=concatBytes([Uint8Array.of(3),textBytes(text)]);
  return concatBytes([strBytes(id),u32be(payload.length),Uint8Array.of(0,0),payload]);
}
function id3UsltFrame(lyrics){
  const payload=concatBytes([Uint8Array.of(3),strBytes('eng'),Uint8Array.of(0),textBytes(lyrics)]);
  return concatBytes([strBytes('USLT'),u32be(payload.length),Uint8Array.of(0,0),payload]);
}
function embedLyricsInMp3(bytes,song,lyrics){
  let start=0;
  if(bytes[0]===0x49&&bytes[1]===0x44&&bytes[2]===0x33&&bytes.length>10){
    const size=(bytes[6]<<21)|(bytes[7]<<14)|(bytes[8]<<7)|bytes[9];
    start=10+size;
    if(bytes[5]&0x10)start+=10;
  }
  const frames=[
    id3TextFrame('TIT2',song.title||''),
    id3TextFrame('TPE1',song.artist||''),
    id3UsltFrame(lyrics)
  ];
  const body=concatBytes(frames);
  const header=concatBytes([strBytes('ID3'),Uint8Array.of(3,0,0),id3Size(body.length)]);
  return new Blob([header,body,bytes.slice(start)],{type:'audio/mpeg'});
}
function wavInfoChunk(id,value){
  let data=textBytes(value);
  if(data.length%2)data=concatBytes([data,Uint8Array.of(0)]);
  return concatBytes([strBytes(id),u32le(data.length),data]);
}
function embedLyricsInWav(bytes,song,lyrics){
  if(String.fromCharCode(...bytes.slice(0,4))!=='RIFF'||String.fromCharCode(...bytes.slice(8,12))!=='WAVE')return null;
  const chunks=[
    wavInfoChunk('INAM',song.title||''),
    wavInfoChunk('IART',song.artist||''),
    wavInfoChunk('ILYR',lyrics)
  ];
  const infoBody=concatBytes([strBytes('INFO'),...chunks]);
  const list=concatBytes([strBytes('LIST'),u32le(infoBody.length),infoBody]);
  const out=concatBytes([bytes,list]);
  new DataView(out.buffer).setUint32(4,out.length-8,true);
  return new Blob([out],{type:'audio/wav'});
}
function readAtomSize(bytes,off){
  if(off+8>bytes.length)return null;
  let size=new DataView(bytes.buffer,bytes.byteOffset+off,4).getUint32(0,false);
  const type=String.fromCharCode(...bytes.slice(off+4,off+8));
  let header=8;
  if(size===1){
    if(off+16>bytes.length)return null;
    const hi=new DataView(bytes.buffer,bytes.byteOffset+off+8,4).getUint32(0,false);
    const lo=new DataView(bytes.buffer,bytes.byteOffset+off+12,4).getUint32(0,false);
    if(hi!==0)return null;
    size=lo;header=16;
  }else if(size===0)size=bytes.length-off;
  if(size<header||off+size>bytes.length)return null;
  return {size,type,header};
}
function makeMp4Atom(type,payload){return concatBytes([u32be(payload.length+8),strBytes(type),payload]);}
function makeMp4DataAtom(text){
  const payload=concatBytes([u32be(1),u32be(0),textBytes(text)]);
  return makeMp4Atom('data',payload);
}
function patchMp4Container(atom,type,path,payloadAtom){
  const self=readAtomSize(atom,0);
  let contentStart=self?self.header:8;
  if(type==='meta')contentStart+=4;
  let pos=contentStart;
  while(pos<atom.length){
    const child=readAtomSize(atom,pos);
    if(!child)break;
    if(child.type===path[0]){
      const patched=path.length===1
        ? patchMp4Container(atom.slice(pos,pos+child.size),child.type,[],payloadAtom)
        : patchMp4Container(atom.slice(pos,pos+child.size),child.type,path.slice(1),payloadAtom);
      const out=concatBytes([atom.slice(0,pos),patched,atom.slice(pos+child.size)]);
      new DataView(out.buffer).setUint32(0,out.length,false);
      return out;
    }
    pos+=child.size;
  }
  if(path.length===0){
    const out=concatBytes([atom.slice(0,atom.length),payloadAtom]);
    new DataView(out.buffer).setUint32(0,out.length,false);
    return out;
  }
  return null;
}
function embedLyricsInM4a(bytes,song,lyrics){
  let off=0, moov=null, mdat=null;
  while(off<bytes.length){
    const atom=readAtomSize(bytes,off);if(!atom)break;
    if(atom.type==='moov')moov={off,size:atom.size};
    if(atom.type==='mdat')mdat={off,size:atom.size};
    off+=atom.size;
  }
  // Avoid moving media data; only patch files where moov is already after mdat.
  if(!moov||!mdat||moov.off<mdat.off)return null;
  const lyricAtom=makeMp4Atom('©lyr',makeMp4DataAtom(lyrics));
  const patchedMoov=patchMp4Container(bytes.slice(moov.off,moov.off+moov.size),'moov',['udta','meta','ilst'],lyricAtom);
  if(!patchedMoov)return null;
  return new Blob([bytes.slice(0,moov.off),patchedMoov,bytes.slice(moov.off+moov.size)],{type:'audio/mp4'});
}
function audioExtFromBytes(bytes,url='',fallback='m4a'){
  const urlExt=(url.split('?')[0].match(/\.([a-z0-9]+)$/i)||[])[1]?.toLowerCase();
  if(['mp3','m4a','mp4','aac','wav','flac','ogg','oga','opus'].includes(urlExt))return urlExt==='mp4'?'m4a':urlExt;
  const head=String.fromCharCode(...bytes.slice(0,12));
  if(bytes[0]===0x49&&bytes[1]===0x44&&bytes[2]===0x33)return 'mp3';
  if(bytes[0]===0xff&&(bytes[1]&0xe0)===0xe0)return 'mp3';
  if(head.startsWith('RIFF')&&head.slice(8,12)==='WAVE')return 'wav';
  if(head.startsWith('fLaC'))return 'flac';
  if(head.startsWith('OggS'))return 'ogg';
  if(head.slice(4,8)==='ftyp')return 'm4a';
  return fallback;
}
async function embedLyricsInAudioBlob(blob,song,lyrics,url=''){
  if(!lyrics)return {blob,embedded:false,reason:'no lyrics'};
  const bytes=new Uint8Array(await blob.arrayBuffer());
  const head=String.fromCharCode(...bytes.slice(0,12));
  const ext=(url.split('?')[0].match(/\.([a-z0-9]+)$/i)||[])[1]?.toLowerCase()||'';
  let out=null;
  if(bytes[0]===0x49&&bytes[1]===0x44&&bytes[2]===0x33||ext==='mp3')out=embedLyricsInMp3(bytes,song,lyrics);
  else if(head.startsWith('RIFF')&&head.slice(8,12)==='WAVE')out=embedLyricsInWav(bytes,song,lyrics);
  else if(head.slice(4,8)==='ftyp'||['m4a','mp4','aac'].includes(ext))out=embedLyricsInM4a(bytes,song,lyrics);
  return out?{blob:out,embedded:true}:{blob,embedded:false,reason:'unsupported format'};
}
// Start a radio from a single song: queue = [song], then related suggestions are
// auto-appended by infinite playback (maybeExtendQueue) as it plays.
async function downloadSaavnSong(songId){
  const song=songs.find(s=>s.id===songId)||saavnSongCache[songId];
  if(!song||!song.streamUrl){toast('No download URL');return;}
  try{
    // Use the 320kbps URL if available, else highest available
    let url=song.streamUrl;
    const qual=song.downloadUrl?.find(q=>q.quality==='320kbps');
    if(qual&&qual.url)url=qual.url;
    const safeName=`${song.artist} - ${song.title}`.replace(/[\\\/:*?"<>|]/g,'_').slice(0,120);
    toast(`⬇ Downloading ${safeName}…`);
    const res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const blob=await res.blob();
    const dlExt=audioExtFromBytes(new Uint8Array(await blob.slice(0,16).arrayBuffer()),url,'m4a');
    let lyrics='', embedded={blob,embedded:false}, finalBlob=blob;
    try{
      lyrics=await lyricsForDownload(song);
      embedded=await embedLyricsInAudioBlob(blob,song,lyrics,url);
      finalBlob=embedded.blob;
    }catch(e){console.warn('[Lyrics embed]',e);}
    const a=document.createElement('a');
    a.href=URL.createObjectURL(finalBlob);
    a.download=safeName+'.'+dlExt;
    document.body.appendChild(a);a.click();a.remove();
    URL.revokeObjectURL(a.href);
    if(embedded.embedded){toast(`Downloaded with lyrics: ${safeName}`);return;}
    if(lyrics){toast(`Downloaded: ${safeName} (lyrics could not be embedded)`);return;}
    toast(`✓ Downloaded: ${safeName}`);
  }catch(e){
    console.error('[Download]',e);
    toast('⚠ Download failed — '+e.message);
  }
}
